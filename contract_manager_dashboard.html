<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestione Scadenze Contratti</title>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.4/dist/jspdf.plugin.autotable.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%232563eb'/><text x='50' y='65' font-size='55' text-anchor='middle' fill='white' font-family='Arial' font-weight='700'>C</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%232563eb'/><text x='50' y='65' font-size='55' text-anchor='middle' fill='white' font-family='Arial' font-weight='700'>C</text></svg>">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#2563eb">
  <style>
    :root {
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      --color-background-primary: #ffffff;
      --color-background-secondary: #f8f7f4;
      --color-background-tertiary: #f0efe9;
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #5f5e5a;
      --color-text-tertiary: #8a8985;
      --color-border-secondary: #d8d6d0;
      --color-border-tertiary: #e8e6e1;
      --color-accent: #2563eb;
      --color-accent-hover: #1d4ed8;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 12px 32px rgba(0,0,0,0.12);
      --transition: 0.2s ease;
    }

    [data-theme="dark"] {
      --color-background-primary: #1a1a1e;
      --color-background-secondary: #242428;
      --color-background-tertiary: #2e2e33;
      --color-text-primary: #e8e8e8;
      --color-text-secondary: #a0a0a0;
      --color-text-tertiary: #707070;
      --color-border-secondary: #3a3a40;
      --color-border-tertiary: #2e2e33;
      --color-accent: #3b82f6;
      --color-accent-hover: #60a5fa;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
      --shadow-lg: 0 12px 32px rgba(0,0,0,0.4);
    }

    [data-theme="dark"] .badge-red { background: #3d1c1c; color: #f87171; }
    [data-theme="dark"] .badge-amber { background: #3d2e0f; color: #fbbf24; }
    [data-theme="dark"] .badge-green { background: #1a2e0a; color: #86efac; }
    [data-theme="dark"] .badge-blue { background: #1a2744; color: #60a5fa; }
    [data-theme="dark"] .badge-gray { background: #2e2e33; color: #a0a0a0; }
    [data-theme="dark"] .alert-banner.danger { background: #3d1c1c; color: #fca5a5; border-color: #7f1d1d; }
    [data-theme="dark"] .alert-banner.warn { background: #3d2e0f; color: #fde68a; border-color: #78350f; }
    [data-theme="dark"] .metric-value.danger { color: #f87171; }
    [data-theme="dark"] .metric-value.warning { color: #fbbf24; }
    [data-theme="dark"] .metric-value.ok { color: #86efac; }
    [data-theme="dark"] .card-field span.days-red { color: #f87171; }
    [data-theme="dark"] .card-field span.days-amber { color: #fbbf24; }
    [data-theme="dark"] .card-field span.days-green { color: #86efac; }
    [data-theme="dark"] .progress-bar-fill.red { background: #ef4444; }
    [data-theme="dark"] .progress-bar-fill.amber { background: #f59e0b; }
    [data-theme="dark"] .progress-bar-fill.green { background: #22c55e; }
    [data-theme="dark"] .btn-sm.danger-btn { color: #f87171; border-color: #7f1d1d; }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--color-background-secondary);
      color: var(--color-text-primary);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      transition: background var(--transition), color var(--transition);
    }

    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    .app {
      max-width: 960px; margin: 0 auto;
      padding: 1rem 1.25rem 3rem;
    }

    /* ── Header ── */
    .app-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.75rem 0 1.25rem; gap: 12px; flex-wrap: wrap;
    }
    .app-title {
      font-size: 20px; font-weight: 600;
      color: var(--color-text-primary);
      display: flex; align-items: center; gap: 10px;
    }
    .app-title svg { flex-shrink: 0; }
    .header-actions { display: flex; gap: 8px; align-items: center; }

    /* ── Theme toggle ── */
    .theme-toggle {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1px solid var(--color-border-secondary);
      background: var(--color-background-primary);
      color: var(--color-text-secondary);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all var(--transition);
    }
    .theme-toggle:hover { background: var(--color-background-tertiary); }
    .theme-toggle svg { width: 18px; height: 18px; }

    /* ── Tabs ── */
    .tabs-bar {
      display: flex; align-items: center; gap: 4px;
      border-bottom: 1px solid var(--color-border-tertiary);
      margin-bottom: 1.5rem; overflow-x: auto; padding-bottom: 0;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .tabs-bar::-webkit-scrollbar { display: none; }
    .tab-btn {
      padding: 10px 16px; font-size: 13px; font-weight: 500;
      border: none; background: none; cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      color: var(--color-text-secondary); border-radius: 0; white-space: nowrap;
      transition: all var(--transition);
      font-family: var(--font-sans);
    }
    .tab-btn:hover { color: var(--color-text-primary); background: var(--color-background-tertiary); }
    .tab-btn.active {
      color: var(--color-accent); border-bottom-color: var(--color-accent);
      font-weight: 600;
    }
    .tab-add {
      padding: 7px 14px; font-size: 13px; font-weight: 500;
      border: 1px dashed var(--color-border-secondary);
      background: transparent;
      color: var(--color-text-secondary); cursor: pointer;
      border-radius: var(--border-radius-md); margin-left: 8px; white-space: nowrap;
      transition: all var(--transition);
      font-family: var(--font-sans);
    }
    .tab-add:hover { background: var(--color-background-tertiary); border-color: var(--color-accent); color: var(--color-accent); }

    /* ── Search bar ── */
    .search-bar {
      position: relative; margin-bottom: 1rem;
    }
    .search-bar input {
      width: 100%; padding: 9px 12px 9px 36px;
      font-size: 13px; border-radius: var(--border-radius-md);
      border: 1px solid var(--color-border-secondary);
      background: var(--color-background-primary);
      color: var(--color-text-primary);
      font-family: var(--font-sans);
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .search-bar input:focus {
      outline: none; border-color: var(--color-accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }
    .search-bar input::placeholder { color: var(--color-text-tertiary); }
    .search-icon {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      color: var(--color-text-tertiary); pointer-events: none;
    }

    .section-title {
      font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--color-text-tertiary);
      margin: 1.5rem 0 0.75rem;
    }

    /* ── Summary grid ── */
    .summary-grid {
      display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px;
      margin-bottom: 1.5rem;
    }
    .metric-card {
      background: var(--color-background-primary);
      border: 1px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-lg); padding: 16px 18px;
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .metric-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .metric-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 6px; }
    .metric-value { font-size: 28px; font-weight: 600; color: var(--color-text-primary); }
    .metric-value.danger { color: #dc2626; }
    .metric-value.warning { color: #d97706; }
    .metric-value.ok { color: #16a34a; }

    /* ── Contract cards ── */
    .contract-card {
      background: var(--color-background-primary);
      border: 1px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-lg); padding: 18px 20px;
      margin-bottom: 12px; position: relative; overflow: hidden;
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .contract-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .contract-card.urgent { border-left: 4px solid #ef4444; }
    .contract-card.warning { border-left: 4px solid #f59e0b; }
    .contract-card.ok { border-left: 4px solid #22c55e; }

    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .card-company { font-size: 16px; font-weight: 600; color: var(--color-text-primary); }
    .card-type { font-size: 12px; color: var(--color-text-secondary); margin-top: 3px; }
    .card-badges { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }

    .badge {
      font-size: 11px; font-weight: 600; padding: 3px 10px;
      border-radius: 99px; white-space: nowrap;
      letter-spacing: 0.01em;
    }
    .badge-red { background: #fef2f2; color: #dc2626; }
    .badge-amber { background: #fffbeb; color: #d97706; }
    .badge-green { background: #f0fdf4; color: #16a34a; }
    .badge-blue { background: #eff6ff; color: #2563eb; }
    .badge-gray { background: var(--color-background-tertiary); color: var(--color-text-secondary); }

    /* ── Progress bar ── */
    .progress-bar {
      width: 100%; height: 4px;
      background: var(--color-background-tertiary);
      border-radius: 99px; margin-top: 14px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; border-radius: 99px;
      transition: width 0.6s ease;
    }
    .progress-bar-fill.red { background: #ef4444; }
    .progress-bar-fill.amber { background: #f59e0b; }
    .progress-bar-fill.green { background: #22c55e; }

    .card-grid {
      display: grid; grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px 16px; margin-top: 14px;
    }
    .card-field label {
      font-size: 11px; color: var(--color-text-tertiary);
      display: block; margin-bottom: 3px; font-weight: 500;
    }
    .card-field span { font-size: 13px; color: var(--color-text-primary); }
    .card-field span.days-red { color: #dc2626; font-weight: 600; }
    .card-field span.days-amber { color: #d97706; font-weight: 600; }
    .card-field span.days-green { color: #16a34a; }

    .card-notes {
      margin-top: 12px; padding: 10px 12px;
      background: var(--color-background-secondary);
      border-radius: var(--border-radius-md);
      font-size: 12px; color: var(--color-text-secondary); line-height: 1.6;
    }
    .card-notes em { color: var(--color-text-tertiary); font-size: 11px; margin-right: 4px; font-style: normal; font-weight: 600; }

    /* ── Causale validation feedback ── */
    .causale-feedback {
      margin-top: 14px; padding: 12px 14px;
      border-radius: var(--border-radius-md);
      font-size: 12px; line-height: 1.6;
      display: flex; align-items: flex-start; gap: 10px;
    }
    .causale-feedback .cf-icon { flex-shrink: 0; font-size: 16px; margin-top: 1px; }
    .causale-feedback .cf-content { flex: 1; }
    .causale-feedback .cf-stato { font-weight: 700; margin-bottom: 2px; }
    .causale-feedback .cf-motivazione { margin-bottom: 2px; }
    .causale-feedback .cf-azione { font-style: italic; opacity: 0.85; }
    .causale-feedback.cf-ok { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
    .causale-feedback.cf-attenzione { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
    .causale-feedback.cf-errore { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    [data-theme="dark"] .causale-feedback.cf-ok { background: #1a2e0a; color: #86efac; border-color: #166534; }
    [data-theme="dark"] .causale-feedback.cf-attenzione { background: #3d2e0f; color: #fde68a; border-color: #78350f; }
    [data-theme="dark"] .causale-feedback.cf-errore { background: #3d1c1c; color: #fca5a5; border-color: #7f1d1d; }
    .badge-causale-ok { background: #f0fdf4; color: #16a34a; }
    .badge-causale-attenzione { background: #fffbeb; color: #d97706; }
    .badge-causale-errore { background: #fef2f2; color: #dc2626; }
    [data-theme="dark"] .badge-causale-ok { background: #1a2e0a; color: #86efac; }
    [data-theme="dark"] .badge-causale-attenzione { background: #3d2e0f; color: #fbbf24; }
    [data-theme="dark"] .badge-causale-errore { background: #3d1c1c; color: #f87171; }

    .card-actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
    .btn-sm {
      font-size: 12px; padding: 7px 14px; font-weight: 500;
      border: 1px solid var(--color-border-secondary);
      background: var(--color-background-primary);
      color: var(--color-text-secondary); cursor: pointer;
      border-radius: var(--border-radius-md);
      transition: all var(--transition);
      font-family: var(--font-sans);
      white-space: nowrap;
    }
    .btn-sm:hover { background: var(--color-background-secondary); }
    .btn-sm:active { transform: scale(0.97); }
    .btn-sm.primary {
      background: var(--color-accent); color: #fff;
      border-color: var(--color-accent);
    }
    .btn-sm.primary:hover { background: var(--color-accent-hover); }
    .btn-sm.danger-btn { color: #dc2626; border-color: #fca5a5; }
    .btn-sm.danger-btn:hover { background: #fef2f2; }

    /* ── Alert banners ── */
    .alert-banner {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 12px 16px; border-radius: var(--border-radius-md);
      margin-bottom: 10px; font-size: 13px;
      animation: slideIn 0.3s ease;
    }
    .alert-banner.danger { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .alert-banner.warn { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
    .alert-icon { flex-shrink: 0; margin-top: 1px; }
    .alert-icon svg { width: 16px; height: 16px; }
    .alert-text { line-height: 1.5; }
    .alert-text strong { font-weight: 600; }

    /* ── Modals ── */
    .modal-bg {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 999;
      animation: fadeIn 0.2s ease;
    }
    .modal {
      background: var(--color-background-primary);
      border: 1px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-lg); padding: 24px 28px;
      width: min(540px, 94vw); max-height: 90vh; overflow-y: auto;
      box-shadow: var(--shadow-lg);
      animation: modalIn 0.25s ease;
    }
    .modal h3 {
      font-size: 17px; font-weight: 600; margin-bottom: 20px;
      color: var(--color-text-primary);
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
    .form-row.single { grid-template-columns: 1fr; }
    .form-field { display: flex; flex-direction: column; gap: 5px; }
    .form-field label { font-size: 12px; color: var(--color-text-secondary); font-weight: 600; }
    .form-field input, .form-field select, .form-field textarea {
      font-size: 13px; border-radius: var(--border-radius-md);
      border: 1px solid var(--color-border-secondary);
      padding: 9px 12px; background: var(--color-background-primary);
      color: var(--color-text-primary); font-family: var(--font-sans);
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .form-field input:focus, .form-field select:focus, .form-field textarea:focus {
      outline: none; border-color: var(--color-accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }
    .form-field textarea { resize: vertical; min-height: 72px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

    /* ── Confirm dialog ── */
    .confirm-body { font-size: 14px; color: var(--color-text-secondary); line-height: 1.6; margin-bottom: 4px; }
    .confirm-body strong { color: var(--color-text-primary); }
    .btn-sm.danger-confirm { background: #dc2626; color: #fff; border-color: #dc2626; }
    .btn-sm.danger-confirm:hover { background: #b91c1c; }

    /* ── Email preview ── */
    .email-preview {
      border: 1px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-md); margin-top: 10px; overflow: hidden;
    }
    .email-header {
      background: var(--color-background-secondary); padding: 10px 14px;
      font-size: 12px; color: var(--color-text-secondary);
      border-bottom: 1px solid var(--color-border-tertiary); line-height: 1.6;
    }
    .email-body {
      padding: 14px 16px; font-size: 13px;
      color: var(--color-text-primary); line-height: 1.7;
    }

    /* ── Editable email ── */
    .email-edit-field { margin-bottom: 12px; }
    .email-edit-field label {
      font-size: 12px; color: var(--color-text-secondary);
      font-weight: 600; display: block; margin-bottom: 5px;
    }
    .email-edit-field input, .email-edit-field textarea {
      width: 100%; font-size: 13px; border-radius: var(--border-radius-md);
      border: 1px solid var(--color-border-secondary);
      padding: 9px 12px; background: var(--color-background-primary);
      color: var(--color-text-primary); font-family: var(--font-sans);
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .email-edit-field input:focus, .email-edit-field textarea:focus {
      outline: none; border-color: var(--color-accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
    }
    .email-edit-field textarea { resize: vertical; min-height: 160px; line-height: 1.6; }
    .email-tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 1px solid var(--color-border-tertiary); }
    .email-tab-btn {
      padding: 8px 16px; font-size: 13px; font-weight: 500;
      border: none; background: none; cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      color: var(--color-text-secondary); font-family: var(--font-sans);
      transition: all var(--transition);
    }
    .email-tab-btn:hover { color: var(--color-text-primary); }
    .email-tab-btn.active { color: var(--color-accent); border-bottom-color: var(--color-accent); }
    .renew-count-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 600; padding: 3px 10px;
      border-radius: 99px; background: #f3e8ff; color: #7c3aed;
    }
    [data-theme="dark"] .renew-count-badge { background: #2e1a47; color: #c4b5fd; }

    .card-employee { font-size: 13px; color: var(--color-text-secondary); margin-top: 2px; }
    .card-employee strong { color: var(--color-text-primary); font-weight: 500; }
    .company-detail-header {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--color-background-primary);
      border: 1px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-lg); padding: 18px 22px;
      margin-bottom: 16px; flex-wrap: wrap; gap: 12px;
    }
    .company-detail-name { font-size: 18px; font-weight: 600; color: var(--color-text-primary); }
    .company-detail-info { font-size: 12px; color: var(--color-text-secondary); margin-top: 4px; display: flex; align-items: center; gap: 6px; }
    @media (max-width: 640px) {
      .company-detail-header { flex-direction: column; align-items: flex-start; }
    }

    /* ── Settings panel ── */
    .settings-section {
      background: var(--color-background-primary);
      border: 1px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-lg); padding: 20px 22px;
      margin-bottom: 16px;
    }
    .settings-section h4 {
      font-size: 14px; font-weight: 600; color: var(--color-text-primary);
      margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
    }
    .settings-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
    .settings-row.single { grid-template-columns: 1fr; }
    .settings-row.triple { grid-template-columns: 1fr 1fr 1fr; }
    .settings-field { display: flex; flex-direction: column; gap: 5px; }

  function encodeRoomName(name) {
    return String(name).replace(/[.#$\[\]\/]/g, '_').substring(0, 128);
  }

  function firebaseValToArray(val) {
    if (!val) return null;
    if (Array.isArray(val)) return val;
    if (typeof val === 'object') {
      const keys = Object.keys(val);
      if (keys.length === 0) return null;
      return keys.map(k => val[k]).filter(Boolean);
    }
    return null;
  }

  function initFirebaseSync() {
    if (!syncConfig.enabled || !syncConfig.apiKey || !syncConfig.databaseURL || !syncConfig.roomName) {
      disconnectSync();
      return;
    }
    try {
      const existing = firebase.apps.find(a => a.name === 'syncApp');
      if (existing) {
        existing.delete().then(connectFirebase).catch(connectFirebase);
      } else {
        connectFirebase();
      }
    } catch(e) {
      console.error('Firebase init error:', e);
      syncState.connected = false;
      updateSyncStatusUI();
    }
  }

  function connectFirebase() {
    try {
      const syncApp = firebase.initializeApp({
        apiKey: syncConfig.apiKey,
        databaseURL: syncConfig.databaseURL
      }, 'syncApp');
      syncState.db = syncApp.database();

      syncState.db.ref('.info/connected').on('value', function(snap) {
        syncState.connected = snap.val() === true;
        updateSyncStatusUI();
      });

      listenRemoteData();
    } catch(e) {
      console.error('Firebase connect error:', e);
      syncState.connected = false;
      updateSyncStatusUI();
    }
  }

  function listenRemoteData() {
    if (!syncState.db || !syncConfig.roomName) return;
    const roomRef = syncState.db.ref('rooms/' + encodeRoomName(syncConfig.roomName) + '/data');
    if (syncState.listener) { syncState.listener.off(); }
    syncState.listener = roomRef;
    roomRef.on('value', function(snap) {
      if (syncState.skipNext) { syncState.skipNext = false; updateSyncStatusUI(); return; }
      const remoteData = firebaseValToArray(snap.val());
      if (remoteData) {
        const localJson = JSON.stringify(state.companies);
        const remoteJson = JSON.stringify(remoteData);
        if (localJson !== remoteJson) {
          state.companies = remoteData;
          try { localStorage.setItem(STORAGE_KEY, JSON.stringify(remoteData)); } catch(e) {}
          syncState.lastSync = new Date().toISOString();
          render();
        }
      }
      updateSyncStatusUI();
    });
  }

  function syncToCloud() {
    if (!syncState.db || !syncConfig.enabled || !syncConfig.roomName) return;
    syncState.skipNext = true;
    const roomRef = syncState.db.ref('rooms/' + encodeRoomName(syncConfig.roomName) + '/data');
    roomRef.set(JSON.parse(JSON.stringify(state.companies))).then(function() {
      syncState.lastSync = new Date().toISOString();
      updateSyncStatusUI();
    }).catch(function(err) {
      console.error('Sync push error:', err);
      syncState.skipNext = false;
    });
  }

  function pullFromCloud() {
    if (!syncState.db || !syncConfig.enabled || !syncConfig.roomName) return;
    const roomRef = syncState.db.ref('rooms/' + encodeRoomName(syncConfig.roomName) + '/data');
    roomRef.once('value').then(function(snap) {
      const remoteData = firebaseValToArray(snap.val());
      if (remoteData) {
        state.companies = remoteData;
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(remoteData)); } catch(e) {}
        syncState.lastSync = new Date().toISOString();
        render();
      } else {
        console.warn('Nessun dato trovato nel cloud per questa stanza.');
      }
      updateSyncStatusUI();
    }).catch(function(err) { console.error('Pull error:', err); });
  }

  function disconnectSync() {
    if (syncState.listener) { syncState.listener.off(); syncState.listener = null; }
    try { const sa = firebase.apps.find(a => a.name === 'syncApp'); if (sa) sa.delete(); } catch(e) {}
    syncState.connected = false;
    syncState.db = null;
    updateSyncStatusUI();
  }

  function updateSyncStatusUI() {
    const el = document.getElementById('sync-status-indicator');
    if (!el) return;
    if (!syncConfig.enabled) {
      el.innerHTML = '<span class="settings-status off">Sincronizzazione disattivata</span>';
    } else if (syncState.connected) {
      const timeStr = syncState.lastSync ? ' — ultimo sync: ' + new Date(syncState.lastSync).toLocaleTimeString('it-IT') : '';
      el.innerHTML = '<span class="settings-status ok">' + icons.check + ' Connesso' + esc(timeStr) + '</span>';
    } else {
      el.innerHTML = '<span class="settings-status warn">Connessione in corso…</span>';
    }
    const btnPull = document.getElementById('btn-sync-pull');
    const btnPush = document.getElementById('btn-sync-push');
    if (btnPull) btnPull.disabled = !syncState.connected;
    if (btnPush) btnPush.disabled = !syncState.connected;
  }

  /* ── Date helpers ── */
  function computeDate(daysFromNow) {
    const d = new Date();
    d.setDate(d.getDate() + daysFromNow);
    return d.toISOString().split('T')[0];
  }
  function daysLeft(dateStr) {
    const today = new Date(); today.setHours(0,0,0,0);
    const end = new Date(dateStr); end.setHours(0,0,0,0);
    return Math.round((end - today) / 86400000);
  }
  function formatDate(dateStr) {
    if (!dateStr) return '—';
    const d = new Date(dateStr);
    return d.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
  }
  function contractDuration(start, end) {
    if (!start || !end) return 0;
    const s = new Date(start); s.setHours(0,0,0,0);
    const e = new Date(end); e.setHours(0,0,0,0);
    return Math.max(1, Math.round((e - s) / 86400000));
  }
  function contractElapsed(start) {
    if (!start) return 0;
    const s = new Date(start); s.setHours(0,0,0,0);
    const today = new Date(); today.setHours(0,0,0,0);
    return Math.max(0, Math.round((today - s) / 86400000));
  }

  /* ── Urgency helpers ── */
  function urgencyClass(days) {
    if (days <= ALERT_DAYS) return 'urgent';
    if (days <= 30) return 'warning';
    return 'ok';
  }
  function urgencyBadge(days) {
    if (days <= 0) return { cls: 'badge-red', text: 'SCADUTO' };
    if (days <= ALERT_DAYS) return { cls: 'badge-red', text: `${days}gg alla scadenza` };
    if (days <= 15) return { cls: 'badge-amber', text: `${days}gg alla scadenza` };
    if (days <= 30) return { cls: 'badge-amber', text: `${days}gg` };
    return { cls: 'badge-green', text: `${days}gg` };
  }

  /* ── Verifica Causale ── */
  function calcolaDurataMesi(startDate, endDate) {
    if (!startDate || !endDate) return 0;
    const s = new Date(startDate);
    const e = new Date(endDate);
    return (e.getFullYear() - s.getFullYear()) * 12 + (e.getMonth() - s.getMonth()) + (e.getDate() > s.getDate() ? 1 : 0);
  }

  function calcolaMesiRimanenti(endDate) {
    if (!endDate) return 0;
    const oggi = new Date(); oggi.setHours(0,0,0,0);
    const fine = new Date(endDate); fine.setHours(0,0,0,0);
    if (fine <= oggi) return 0;
    return (fine.getFullYear() - oggi.getFullYear()) * 12 + (fine.getMonth() - oggi.getMonth()) + (fine.getDate() > oggi.getDate() ? 1 : 0);
  }

  function verificaCausale(durata_totale_mesi, numero_proroghe, presenza_causale) {
    durata_totale_mesi = parseInt(durata_totale_mesi) || 0;
    numero_proroghe = parseInt(numero_proroghe) || 0;
    presenza_causale = !!presenza_causale;

    // Regola 5: proroghe > 4 → tempo indeterminato
    if (numero_proroghe > 4) {
      return {
        stato: 'ERRORE',
        motivazione: 'Superato il limite di 4 proroghe (' + numero_proroghe + ' effettuate). Il contratto è da considerarsi a tempo indeterminato.',
        azione_consigliata: 'Convertire il contratto a tempo indeterminato o regolarizzare la posizione.'
      };
    }

    // Regola 3: durata > 24 mesi
    if (durata_totale_mesi > 24) {
      return {
        stato: 'ERRORE',
        motivazione: 'La durata totale (' + durata_totale_mesi + ' mesi) supera il limite massimo di 24 mesi.',
        azione_consigliata: 'Ridurre la durata del contratto a massimo 24 mesi oppure convertire a tempo indeterminato.'
      };
    }

    // Regola 2: durata > 12 mesi senza causale
    if (durata_totale_mesi > 12 && !presenza_causale) {
      return {
        stato: 'ERRORE',
        motivazione: 'Durata superiore a 12 mesi (' + durata_totale_mesi + ' mesi) senza causale. La causale è obbligatoria oltre i 12 mesi.',
        azione_consigliata: 'Inserire una causale valida oppure ridurre la durata a 12 mesi o meno.'
      };
    }

    // Attenzione: esattamente 12 mesi senza causale (limite)
    if (durata_totale_mesi === 12 && !presenza_causale) {
      return {
        stato: 'ATTENZIONE',
        motivazione: 'Durata al limite massimo (12 mesi) senza causale.',
        azione_consigliata: 'Qualsiasi estensione oltre i 12 mesi richiederà una causale obbligatoria.'
      };
    }

    // Attenzione: 4 proroghe (limite)
    if (numero_proroghe === 4) {
      return {
        stato: 'ATTENZIONE',
        motivazione: 'Raggiunto il numero massimo di proroghe consentite (4 su 4).',
        azione_consigliata: 'Non è possibile effettuare ulteriori proroghe. Valutare conversione a tempo indeterminato.'
      };
    }

    // Attenzione: durata vicina a 24 mesi (>= 22)
    if (durata_totale_mesi >= 22) {
      return {
        stato: 'ATTENZIONE',
        motivazione: 'Durata totale (' + durata_totale_mesi + ' mesi) vicina al limite massimo di 24 mesi.',
        azione_consigliata: 'Pianificare la chiusura o la conversione del contratto prima del termine dei 24 mesi.'
      };
    }

    // Attenzione: 3 proroghe (vicino al limite)
    if (numero_proroghe === 3) {
      return {
        stato: 'ATTENZIONE',
        motivazione: 'Effettuate 3 proroghe su un massimo di 4.',
        azione_consigliata: 'Resta una sola proroga disponibile. Valutare le prossime azioni contrattuali.'
      };
    }

    // Tutto OK
    return {
      stato: 'OK',
      motivazione: 'Tutte le regole normative sono rispettate (durata: ' + durata_totale_mesi + ' mesi, proroghe: ' + numero_proroghe + '/4' + (presenza_causale ? ', con causale' : '') + ').',
      azione_consigliata: 'Nessuna azione richiesta.'
    };
  }

  function verificaCausaleContratto(c) {
    if (!c || !c.startDate || !c.endDate) return null;
    const durata = calcolaDurataMesi(c.startDate, c.endDate);
    const proroghe = c.renewCount || 0;
    const causale = c.renewType === 'Con causale';
    return verificaCausale(durata, proroghe, causale);
  }

  function renderCausaleFeedback(result) {
    if (!result) return '';
    const clsMap = { 'OK': 'cf-ok', 'ATTENZIONE': 'cf-attenzione', 'ERRORE': 'cf-errore' };
    const iconMap = { 'OK': '\u2705', 'ATTENZIONE': '\u26A0\uFE0F', 'ERRORE': '\u274C' };
    const cls = clsMap[result.stato] || 'cf-ok';
    const icon = iconMap[result.stato] || '';
    return '<div class="causale-feedback ' + cls + '">' +
      '<span class="cf-icon">' + icon + '</span>' +
      '<div class="cf-content">' +
        '<div class="cf-stato">' + esc(result.stato) + '</div>' +
        '<div class="cf-motivazione">' + esc(result.motivazione) + '</div>' +
        '<div class="cf-azione">' + esc(result.azione_consigliata) + '</div>' +
      '</div></div>';
  }

  function sortedContracts(contracts) {
    return [...contracts].sort((a, b) => {
      if (state.sortBy === 'urgency') return daysLeft(a.endDate) - daysLeft(b.endDate);
      if (state.sortBy === 'name') return a.name.localeCompare(b.name);
      if (state.sortBy === 'date') return new Date(a.endDate) - new Date(b.endDate);
      return 0;
    });
  }

  function filteredContracts() {
    let list = state.companies;
    if (state.searchQuery) {
      const q = state.searchQuery.toLowerCase();
      list = list.filter(c =>
        c.name.toLowerCase().includes(q) ||
        c.contractType.toLowerCase().includes(q) ||
        (c.employeeName && c.employeeName.toLowerCase().includes(q)) ||
        (c.notes && c.notes.toLowerCase().includes(q))
      );
    }
    if (state.filterMonth) {
      list = list.filter(c => {
        if (!c.endDate) return false;
        return c.endDate.substring(0, 7) === state.filterMonth;
      });
    }
    return list;
  }

  /* ── Toast ── */
  function showToast(msg) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2600);

  /* ── Title update ── */
  function attachCausaleListeners() {
    const fb = document.getElementById('causale-live-feedback');
    if (!fb) return;
    const fields = ['f-start', 'f-end', 'f-rtype', 'f-renewcount'];

        el.addEventListener('input', updateCausaleLive);

  function updateCausaleLive() {
    const fb = document.getElementById('causale-live-feedback');
    if (!fb) return;
    const startDate = (document.getElementById('f-start') || {}).value;
    const endDate = (document.getElementById('f-end') || {}).value;
    const renewType = (document.getElementById('f-rtype') || {}).value;
    const renewCount = parseInt((document.getElementById('f-renewcount') || {}).value) || 0;
    if (!startDate || !endDate) { fb.innerHTML = ''; return; }
    const durata = calcolaDurataMesi(startDate, endDate);
    /* Auto-aggiorna durata proroga dal contratto */
    const fMonths = document.getElementById('f-months');
    if (fMonths && durata > 0) fMonths.value = durata;
    const causale = renewType === 'Con causale';
    const result = verificaCausale(durata, renewCount, causale);
    fb.innerHTML = renderCausaleFeedback(result);
  }

  function updateTitle() {
    const urgentCount = state.companies.filter(c => daysLeft(c.endDate) <= ALERT_DAYS && daysLeft(c.endDate) >= 0).length;
    const expiredCount = state.companies.filter(c => daysLeft(c.endDate) < 0).length;
    const alertTotal = urgentCount + expiredCount;
    document.title = (alertTotal > 0 ? `(${alertTotal}) ` : '') + 'Gestione Scadenze Contratti';
  }

  /* ── Email sending engine ── */
  function isEmailJSConfigured() {
    const s = emailSettings.emailjs;
    return s.serviceId && s.templateId && s.publicKey;
  }

  function addLogEntry(contractName, recipients, status, method, detail) {
    emailLog.unshift({
      date: new Date().toISOString(),
      contractName, recipients, status, method,
      detail: detail || ''
    });
    if (emailLog.length > 100) emailLog.length = 100;
    saveEmailLog();
  }

  function sentTrackerKey(contractId, daysThreshold) {
    const today = new Date().toISOString().split('T')[0];
    return `${contractId}_${daysThreshold}_${today}`;
  }

  async function sendEmailReal(toAddresses, subject, bodyText, contractName) {
    const method = emailSettings.sendMethod;

    if (method === 'emailjs' && isEmailJSConfigured()) {
      try {
        const s = emailSettings.emailjs;
        emailjs.init(s.publicKey);
        await emailjs.send(s.serviceId, s.templateId, {
          to_email: toAddresses,
          subject: subject,
          message: bodyText,
          contract_name: contractName
        });
        addLogEntry(contractName, toAddresses, 'success', 'emailjs', 'Inviata con successo via EmailJS');
        return { ok: true, method: 'emailjs' };
      } catch (err) {
        const errMsg = (err && err.text) || String(err);
        addLogEntry(contractName, toAddresses, 'error', 'emailjs', errMsg);
        return { ok: false, method: 'emailjs', error: errMsg };
      }
    }

    if (method === 'mailto' || !isEmailJSConfigured()) {
      const mailTo = toAddresses.replace(/;/g, ',').replace(/\s/g, '');
      const mailSubject = encodeURIComponent(subject);
      const mailBody = encodeURIComponent(bodyText);
      const href = `mailto:${mailTo}?subject=${mailSubject}&body=${mailBody}`;
      const a = document.createElement('a');
      a.href = href;
      a.click();
      addLogEntry(contractName, toAddresses, 'success', 'mailto', 'Aperto nel client email');
      return { ok: true, method: 'mailto' };
    }

    return { ok: false, method: 'none', error: 'Nessun metodo configurato' };
  }

  /* ── Auto-send engine ── */
  let autoSendInterval = null;

  function startAutoSend() {
    stopAutoSend();
    if (!emailSettings.autoSend.enabled) return;
    const ms = (emailSettings.autoSend.checkIntervalMinutes || 60) * 60 * 1000;
    runAutoSendCheck();
    autoSendInterval = setInterval(runAutoSendCheck, ms);
  }

  function stopAutoSend() {
    if (autoSendInterval) { clearInterval(autoSendInterval); autoSendInterval = null; }
  }

  async function runAutoSendCheck() {
    if (!emailSettings.autoSend.enabled) return;
    const thresholds = emailSettings.autoSend.daysBeforeExpiry || [];

    for (const c of state.companies) {
      const days = daysLeft(c.endDate);
      if (days < 0) continue;

      for (const threshold of thresholds) {
        if (days <= threshold) {
          const key = sentTrackerKey(c.id, threshold);
          if (sentTracker[key]) continue;

          const recipients = `${c.adminEmail}; ${c.companyEmail}`;
          const subject = `[AUTO] Contratto in scadenza — ${c.name}${c.employeeName ? ' (' + c.employeeName + ')' : ''} (${days} giorni)`;
          const body = generateEmailBody(c, days);
          const result = await sendEmailReal(recipients, subject, body, c.name);

          if (result.ok) {
            sentTracker[key] = new Date().toISOString();
            saveSentTracker();
          }
          break;
        }
      }
    }
  }

  /* ── Export helpers ── */
  function getExportHeaders() {
    return ['Nome Azienda','Dipendente','Tipo Contratto','Data Inizio','Data Scadenza','Giorni Rimanenti','Stato','Prorogabile','Durata Proroga (mesi)','Tipo Proroga','Preavviso (gg)','Proroghe effettuate','Email Admin','Email Azienda','Note'];
  }
  function getExportRows() {
    return sortedContracts(state.companies).map(c => {
      const days = daysLeft(c.endDate);
      const stato = days < 0 ? 'Scaduto' : days <= ALERT_DAYS ? 'Urgente' : days <= 30 ? 'In scadenza' : 'Regolare';
      return [
        c.name, c.employeeName || '', c.contractType,
        formatDate(c.startDate), formatDate(c.endDate), days, stato,
        c.renewable ? 'Sì' : 'No', c.renewMonths || '', c.renewType || '', c.renewNotice || '',
        c.renewCount || 0, c.adminEmail || '', c.companyEmail || '', c.notes || ''
      ];
    });
  }

  /* ── Import Excel ── */
  function triggerImportExcel() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.xlsx,.xls,.csv';
    input.style.display = 'none';
    input.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(evt) {
        try {
          const data = new Uint8Array(evt.target.result);
          const wb = XLSX.read(data, { type: 'array', cellDates: true });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
          if (!rows.length) { showToast('Il file non contiene dati.'); return; }
          importRows(rows);
        } catch(err) {
          console.error('Import error:', err);
          showToast('Errore nella lettura del file: ' + err.message);
        }
      };
      reader.readAsArrayBuffer(file);
      input.remove();
    });
    document.body.appendChild(input);
    input.click();
  }
  window.triggerImportExcel = triggerImportExcel;

  function importRows(rows) {
    const colMap = {
      'nome azienda': 'name', 'azienda': 'name', 'company': 'name', 'nome': 'name', 'ragione sociale': 'name',
      'dipendente': 'employeeName', 'nome dipendente': 'employeeName', 'employee': 'employeeName', 'lavoratore': 'employeeName', 'nome e cognome': 'employeeName',
      'tipo contratto': 'contractType', 'tipo': 'contractType', 'contract type': 'contractType', 'tipologia': 'contractType',
      'data inizio': 'startDate', 'inizio': 'startDate', 'start date': 'startDate', 'data assunzione': 'startDate',
      'data scadenza': 'endDate', 'scadenza': 'endDate', 'end date': 'endDate', 'data fine': 'endDate', 'fine': 'endDate',
      'prorogabile': 'renewable', 'rinnovo': 'renewable', 'renewable': 'renewable',
      'durata proroga': 'renewMonths', 'durata proroga (mesi)': 'renewMonths', 'mesi proroga': 'renewMonths', 'mesi rinnovo': 'renewMonths',
      'tipo proroga': 'renewType', 'tipo rinnovo': 'renewType',
      'preavviso': 'renewNotice', 'preavviso (gg)': 'renewNotice', 'giorni preavviso': 'renewNotice',
      'proroghe effettuate': 'renewCount', 'numero proroghe': 'renewCount', 'rinnovi': 'renewCount',
      'email admin': 'adminEmail', 'admin email': 'adminEmail', 'email amministratore': 'adminEmail',
      'email azienda': 'companyEmail', 'company email': 'companyEmail',
      'note': 'notes', 'notes': 'notes', 'commenti': 'notes',
    };

    const headers = Object.keys(rows[0]);
    const mapping = {};
    headers.forEach(h => {
      const norm = h.toLowerCase().trim();
      if (colMap[norm]) mapping[h] = colMap[norm];
    });

    if (!mapping || Object.keys(mapping).length === 0) {
      showToast('Intestazioni non riconosciute. Usa: Nome Azienda, Dipendente, Tipo Contratto, Data Inizio, Data Scadenza…');
      return;
    }

    let maxId = state.companies.reduce((m, c) => Math.max(m, c.id || 0), 0);
    let imported = 0;

    rows.forEach(row => {
      const mapped = {};
      Object.keys(mapping).forEach(h => {
        mapped[mapping[h]] = row[h];
      });

      if (!mapped.name && !mapped.endDate) return;

      mapped.startDate = parseImportDate(mapped.startDate);
      mapped.endDate = parseImportDate(mapped.endDate);
      if (!mapped.endDate) return;

      maxId++;
      const contract = {
        id: maxId,
        name: String(mapped.name || 'Importato').trim(),
        employeeName: String(mapped.employeeName || '').trim(),
        contractType: String(mapped.contractType || 'Non specificato').trim(),
        startDate: mapped.startDate || '',
        endDate: mapped.endDate,
        renewable: parseImportBool(mapped.renewable),
        renewMonths: parseInt(mapped.renewMonths) || 12,
        renewType: String(mapped.renewType || 'Senza causale').trim(),
        renewNotice: parseInt(mapped.renewNotice) || 30,
        renewCount: parseInt(mapped.renewCount) || 0,
        adminEmail: String(mapped.adminEmail || '').trim(),
        companyEmail: String(mapped.companyEmail || '').trim(),
        notes: String(mapped.notes || '').trim(),
        cantieri: []
      };

      state.companies.push(contract);
      imported++;
    });

    if (imported > 0) {
      saveData();
      render();
      showToast('Importati ' + imported + ' contratti con successo.');
    } else {
      showToast('Nessun contratto valido trovato nel file.');
    }
  }

  function parseImportDate(val) {
    if (!val) return '';
    if (val instanceof Date) {
      const y = val.getFullYear(); const m = String(val.getMonth()+1).padStart(2,'0'); const d = String(val.getDate()).padStart(2,'0');
      return y + '-' + m + '-' + d;
    }
    const s = String(val).trim();
    // yyyy-mm-dd
    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    // dd/mm/yyyy
    const dmy = s.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})$/);
    if (dmy) return dmy[3] + '-' + dmy[2].padStart(2,'0') + '-' + dmy[1].padStart(2,'0');
    // try Date parse
    const d = new Date(s);
    if (!isNaN(d.getTime())) {
      return d.toISOString().split('T')[0];
    }
    return '';
  }

  function parseImportBool(val) {
    if (typeof val === 'boolean') return val;
    const s = String(val || '').toLowerCase().trim();
    return ['sì', 'si', 'yes', 'true', '1', 'vero', 'x'].includes(s);
  }

  /* ── Export CSV ── */
  function exportCSV() {
    const headers = getExportHeaders();
    const rows = getExportRows();
    const csvContent = [headers, ...rows].map(r => r.map(v => `"${String(v ?? '').replace(/"/g, '""')}"`).join(',')).join('\n');
    const bom = '\uFEFF';
    const blob = new Blob([bom + csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `contratti_${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('CSV esportato con successo');
  }

  /* ── Export Excel ── */
  function exportExcel() {
    const headers = getExportHeaders();
    const rows = getExportRows();
    const wsData = [headers, ...rows];
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(wsData);

    /* Column widths */
    ws['!cols'] = [
      { wch: 22 }, /* Nome Azienda */
      { wch: 20 }, /* Dipendente */
      { wch: 22 }, /* Tipo Contratto */
      { wch: 12 }, /* Data Inizio */
      { wch: 12 }, /* Data Scadenza */
      { wch: 8 },  /* Giorni */
      { wch: 10 }, /* Stato */
      { wch: 10 }, /* Prorogabile */
      { wch: 10 }, /* Durata Proroga */
      { wch: 14 }, /* Tipo Proroga */
      { wch: 10 }, /* Preavviso */

        5: { cellWidth: 10, halign: 'center' },
        6: { cellWidth: 16 },
        7: { cellWidth: 10, halign: 'center' },
        8: { cellWidth: 14, halign: 'center' },
        9: { cellWidth: 18 },
        10: { cellWidth: 14, halign: 'center' },
        11: { cellWidth: 10, halign: 'center' },
        12: { cellWidth: 30 },
        13: { cellWidth: 30 }
      },
      didParseCell: function(data) {
        if (data.section === 'body' && data.column.index === 6) {
          const v = data.cell.raw;
          if (v === 'Scaduto') { data.cell.styles.textColor = [220, 38, 38]; data.cell.styles.fontStyle = 'bold'; }
          else if (v === 'Urgente') { data.cell.styles.textColor = [217, 119, 6]; data.cell.styles.fontStyle = 'bold'; }
          else if (v === 'In scadenza') { data.cell.styles.textColor = [202, 138, 4]; }
          else { data.cell.styles.textColor = [22, 163, 74]; }
        }
      },
      margin: { left: 14, right: 14 }
    });

    /* Footer with notes for contracts that have them */
    const contractsWithNotes = state.companies.filter(c => c.notes);
    if (contractsWithNotes.length > 0) {
      let y = doc.lastAutoTable.finalY + 8;
      if (y > 180) { doc.addPage(); y = 16; }
      doc.setFontSize(10);
      doc.setFont(undefined, 'bold');
      doc.text('Note', 14, y);
      y += 5;
      doc.setFontSize(8);
      doc.setFont(undefined, 'normal');
      contractsWithNotes.forEach(c => {
        if (y > 190) { doc.addPage(); y = 16; }
        doc.setFont(undefined, 'bold');
        doc.text(`${c.name}${c.employeeName ? ' — ' + c.employeeName : ''}:`, 14, y);
        doc.setFont(undefined, 'normal');
        const noteLines = doc.splitTextToSize(c.notes, 260);
        doc.text(noteLines, 14, y + 4);
        y += 4 + (noteLines.length * 3.5) + 3;
      });
    }

    /* Page numbers */
    const pages = doc.internal.getNumberOfPages();
    for (let i = 1; i <= pages; i++) {
      doc.setPage(i);
      doc.setFontSize(8);
      doc.setTextColor(150);
      doc.text(`Pag. ${i}/${pages}`, doc.internal.pageSize.getWidth() - 14, doc.internal.pageSize.getHeight() - 8, { align: 'right' });
    }

    doc.save(`contratti_${new Date().toISOString().split('T')[0]}.pdf`);
    showToast('PDF esportato con successo');
  }

  /* ── Progress bar ── */
  function progressBarHTML(c) {
    const total = contractDuration(c.startDate, c.endDate);
    const elapsed = contractElapsed(c.startDate);
    const pct = Math.min(100, Math.max(0, (elapsed / total) * 100));
    const days = daysLeft(c.endDate);
    let color = 'green';
    if (days <= 0) color = 'red';
    else if (days <= ALERT_DAYS) color = 'red';
    else if (days <= 30) color = 'amber';
    return `<div class="progress-bar"><div class="progress-bar-fill ${color}" style="width:${pct.toFixed(1)}%"></div></div>`;
  }

        </div>

      </div>
    </header>`;

    html += `<h2 class="sr-only">Gestore contratti aziendali con scadenze e notifiche</h2>`;

    tabs.forEach((t, i) => {

    });

    /* Settings panel */

        html += `<div class="section-title">Contratti (${companyContracts.length})</div>`;
        sortedContracts(companyContracts).forEach(c => {
          html += renderCard(c, true);
          const days = daysLeft(c.endDate);
          if (days >= 0 && days <= ALERT_DAYS) {
            html += renderEmailPreview(c, days);

          // Visualizza scadenze cantieri come card (stesso stile dei contratti)
          if (Array.isArray(c.cantieri) && c.cantieri.length > 0) {
            html += `<hr style='border:0;border-top:2px dashed #d8d6d0;margin:18px 0 12px 0;'>`;
            html += `<div class="cantieri-box">
              <div class="cantieri-title">Scadenze Cantieri</div>`;
            c.cantieri.forEach((ct, ci) => {
              html += renderCantiere(ct, c, ci);
            });
            html += `</div>`;
          }
// ...existing code...
        });
        // Form aggiunta cantiere
        html += `<div style='margin:18px 0 0 0;padding:12px 14px;background:#f0efe9;border-radius:8px;border:1px solid #e8e6e1'>

          <input id='cantiere-nome' type='text' placeholder='Nome cantiere' style='margin:4px 8px 4px 0'>
          <input id='cantiere-scadenza' type='date' style='margin:4px 8px 4px 0'>
          <input id='cantiere-note' type='text' placeholder='Note' style='margin:4px 8px 4px 0'>

      // Funzione per aggiungere scadenza cantiere a tutti i contratti di una azienda
      window.aggiungiCantiereAzienda = function(companyName) {
        const nome = document.getElementById('cantiere-nome').value.trim();
        const scadenza = document.getElementById('cantiere-scadenza').value;
        const note = document.getElementById('cantiere-note').value.trim();
        if (!nome || !scadenza) { showToast('Inserisci nome e scadenza cantiere'); return; }
        let added = 0;
        let skipped = 0;
        state.companies.forEach(c => {
          if (c.name === companyName) {
            if (!Array.isArray(c.cantieri)) c.cantieri = [];
            // evita duplicati (stesso nome + stessa scadenza + stessa nota)
            const exists = c.cantieri.some(x => x.nome === nome && x.scadenza === scadenza && (x.note || '') === (note || ''));
            if (!exists) {
              c.cantieri.push({ nome, scadenza, note });
              added++;
            } else {
              skipped++;
            }
          }
        });

  function renderCard(c, detail = false) {
    const days = daysLeft(c.endDate);
    const uc = urgencyClass(days);
    const ub = urgencyBadge(days);
    let html = `<div class="contract-card ${uc}">
      <div class="card-header">
        <div>
          <div class="card-company">${esc(c.name)}</div>
          ${c.employeeName ? `<div class="card-employee">Dipendente: <strong>${esc(c.employeeName)}</strong></div>` : ''}
          <div class="card-type">${esc(c.contractType)}</div>
        </div>
        <div class="card-badges">
          <span class="badge ${ub.cls}">${ub.text}</span>
          ${c.renewable ? '<span class="badge badge-blue">Prorogabile</span>' : '<span class="badge badge-gray">Non prorogabile</span>'}
          ${(c.renewCount || 0) > 0 ? '<span class="renew-count-badge">' + c.renewCount + '× prorogato</span>' : ''}
          ${(() => { const cr = verificaCausaleContratto(c); if (!cr) return ''; const bm = { 'OK': 'badge-causale-ok', 'ATTENZIONE': 'badge-causale-attenzione', 'ERRORE': 'badge-causale-errore' }; return '<span class="badge ' + (bm[cr.stato] || '') + '">' + (cr.stato === 'OK' ? 'Normativa OK' : cr.stato === 'ATTENZIONE' ? 'Attenzione' : 'Violazione') + '</span>'; })()}
        </div>
      </div>`;
    html += progressBarHTML(c);
    html += `<div class="card-grid">
        <div class="card-field"><label>Inizio</label><span>${formatDate(c.startDate)}</span></div>
        <div class="card-field"><label>Scadenza</label><span>${formatDate(c.endDate)}</span></div>
        <div class="card-field"><label>Giorni rimanenti</label><span class="${days<=0?'days-red':days<=ALERT_DAYS?'days-red':days<=30?'days-amber':'days-green'}">${days <= 0 ? 'Scaduto' : days + ' giorni'}</span></div>
        <div class="card-field"><label>Mesi rimanenti</label><span class="${days<=0?'days-red':days<=ALERT_DAYS?'days-red':days<=30?'days-amber':'days-green'}">${days <= 0 ? 'Scaduto' : calcolaMesiRimanenti(c.endDate) + ' mesi'}</span></div>
        <div class="card-field"><label>Durata contratto</label><span>${calcolaDurataMesi(c.startDate, c.endDate)} mesi</span></div>
        <div class="card-field"><label>Preavviso proroga</label><span>${c.renewNotice ? c.renewNotice + ' giorni' : '—'}</span></div>
      </div>`;

    const causaleResult = verificaCausaleContratto(c);
    if (causaleResult) {
      html += renderCausaleFeedback(causaleResult);
    }
    if (c.notes) {
      html += `<div class="card-notes"><em>Note:</em> ${esc(c.notes)}</div>`;
    }
    html += `<div class="card-actions">
        <button class="btn-sm" onclick="editContract(${c.id})">Modifica</button>
        <button class="btn-sm" onclick="sendTestEmail(${c.id})">${icons.mail} Email</button>
        <button class="btn-sm danger-btn" onclick="confirmDeleteContract(${c.id})">Elimina</button>
      </div></div>`;
    return html;
  }

    function renderCantiere(ct, contract, idx) {

      const ub = urgencyBadge(days);

        <div class="card-header">
          <div>
            <div class="card-company">${esc(ct.nome)}</div>
            ${contract.employeeName ? `<div class="card-employee">Dipendente: <strong>${esc(contract.employeeName)}</strong></div>` : ''}
            <div class="card-type">Cantiere — ${esc(contract.name)}</div>
          </div>
          <div class="card-badges">
            <span class="badge ${ub.cls}">${ub.text}</span>
          </div>
        </div>
        <div class="card-grid">
          <div class="card-field"><label>Scadenza</label><span>${formatDate(ct.scadenza)}</span></div>
          <div class="card-field"><label>Giorni rimanenti</label><span class="${days<=0?'days-red':days<=ALERT_DAYS?'days-red':days<=30?'days-amber':'days-green'}">${days <= 0 ? 'Scaduto' : days + ' giorni'}</span></div>

        </div>
        <div class="card-actions">
          <button class="btn-sm" onclick="openEditCantiere(${contract.id}, ${idx})">Modifica</button>
          <button class="btn-sm danger-btn" onclick="deleteCantiere(${contract.id}, ${idx})">Elimina</button>

    function renderCantiereModal() {
      if (!state.cantiereModal || !state.editingCantiere) return '';
      const e = state.editingCantiere;
      return `<div class="modal-bg" onclick="closeCantiereModal()">
        <div class="modal" onclick="event.stopPropagation()" role="dialog" aria-label="${e.idx>=0? 'Modifica scadenza cantiere' : 'Nuova scadenza cantiere'}" style="width:min(520px,94vw)">
          <h3>${e.idx>=0? 'Modifica scadenza cantiere' : 'Nuova scadenza cantiere'}</h3>
          <div class="form-row">
            <div class="form-field"><label for="cm-nome">Nome cantiere</label><input id="cm-nome" type="text" value="${escAttr(e.nome||'')}"></div>
            <div class="form-field"><label for="cm-scadenza">Scadenza</label><input id="cm-scadenza" type="date" value="${e.scadenza||''}"></div>
          </div>
          <div class="form-row single"><div class="form-field"><label for="cm-note">Note</label><input id="cm-note" type="text" value="${escAttr(e.note||'')}"></div></div>
          <div class="modal-actions">
            <button class="btn-sm" onclick="closeCantiereModal()">Annulla</button>
            <button class="btn-sm primary" onclick="saveCantiere()">Salva</button>
          </div>
        </div>
      </div>`;
    }

    window.openEditCantiere = function(contractId, idx) {
      const contract = state.companies.find(c => c.id === contractId);
      if (!contract) return;
      const ct = (Array.isArray(contract.cantieri) && contract.cantieri[idx]) ? contract.cantieri[idx] : { nome: '', scadenza: '', note: '' };
      state.cantiereModal = true;
      state.editingCantiere = { contractId: contractId, idx: idx, nome: ct.nome || '', scadenza: ct.scadenza || '', note: ct.note || '' };
      render();
    };

    window.closeCantiereModal = function() {
      state.cantiereModal = false;
      state.editingCantiere = null;
      render();
    };

    window.saveCantiere = function() {
      const e = state.editingCantiere || {};
      const nome = (document.getElementById('cm-nome') || {}).value?.trim() || '';
      const scadenza = (document.getElementById('cm-scadenza') || {}).value || '';
      const note = (document.getElementById('cm-note') || {}).value?.trim() || '';
      if (!nome || !scadenza) { showToast('Inserisci nome e scadenza cantiere'); return; }
      const contract = state.companies.find(c => c.id === e.contractId);
      if (!contract) return;
      if (!Array.isArray(contract.cantieri)) contract.cantieri = [];
      if (typeof e.idx === 'number' && e.idx >= 0 && contract.cantieri[e.idx]) {
        // Se modificando, evita di creare duplicati: se esiste già un'altra voce identica, rimuovi l'elemento corrente
        const duplicate = contract.cantieri.findIndex((x, i) => i !== e.idx && x.nome === nome && x.scadenza === scadenza && (x.note || '') === (note || ''));
        if (duplicate >= 0) {
          // rimuove la voce corrente (unisce) per evitare duplicati
          contract.cantieri.splice(e.idx, 1);
          showToast('Modifica unita a cantiere esistente (duplicato rimosso)');
        } else {
          contract.cantieri[e.idx] = { nome, scadenza, note };
          showToast('Scadenza cantiere aggiornata');
        }
      } else {
        const exists = contract.cantieri.some(x => x.nome === nome && x.scadenza === scadenza && (x.note || '') === (note || ''));
        if (!exists) {
          contract.cantieri.push({ nome, scadenza, note });
          showToast('Scadenza cantiere aggiunta');
        } else {
          showToast('Cantiere già presente, nessuna azione eseguita');
        }
      }
      saveData();
      state.cantiereModal = false;
      state.editingCantiere = null;
      render();
    };

    window.deleteCantiere = function(contractId, idx) {
      const contract = state.companies.find(c => c.id === contractId);
      if (!contract || !Array.isArray(contract.cantieri)) return;
      contract.cantieri.splice(idx, 1);
      saveData();
      render();
      showToast('Scadenza cantiere rimossa');
    };

    function renderEmailPreview(c, days) {
    return `<div class="email-preview">
      <div class="email-header">
        A: ${esc(c.adminEmail)}; ${esc(c.companyEmail)}<br>
        Oggetto: [ALERT] Contratto in scadenza — ${esc(c.name)} (${days} giorni)
      </div>
      <div class="email-body">
        Gentile amministratore,<br><br>
        questo è un avviso automatico: il contratto con <strong>${esc(c.name)}</strong>${c.employeeName ? ' — dipendente: <strong>' + esc(c.employeeName) + '</strong>' : ''} (${esc(c.contractType)}) scadrà il <strong>${formatDate(c.endDate)}</strong>, tra <strong>${days} giorni</strong>.<br><br>
        ${c.renewable ? `Il contratto è <strong>prorogabile</strong> per ${c.renewMonths} mesi — modalità: ${esc(c.renewType)}. Preavviso richiesto: ${c.renewNotice} giorni.<br><br>` : 'Il contratto <strong>non è prorogabile</strong>.<br><br>'}
        ${c.notes ? `Note: ${esc(c.notes)}<br><br>` : ''}
        Si prega di procedere con le formalità necessarie.<br><br>
        — Sistema di gestione contratti
      </div>
    </div>`;
  }

  function generateEmailBody(c, days) {
    let body = `Gentile amministratore,\n\nquesto è un avviso automatico: il contratto con ${c.name}${c.employeeName ? ' — dipendente: ' + c.employeeName : ''} (${c.contractType}) scadrà il ${formatDate(c.endDate)}, tra ${days} giorni.\n\n`;
    if (c.renewable) {
      body += `Il contratto è prorogabile per ${c.renewMonths} mesi — modalità: ${c.renewType}. Preavviso richiesto: ${c.renewNotice} giorni.\n`;
      if ((c.renewCount || 0) > 0) body += `Proroghe già effettuate: ${c.renewCount}.\n`;
      body += '\n';
    } else {
      body += 'Il contratto non è prorogabile.\n\n';
    }
    if (c.notes) body += `Note: ${c.notes}\n\n`;
    body += 'Si prega di procedere con le formalità necessarie.\n\n— Sistema di gestione contratti';
    return body;
  }

  function renderEmailModal(c) {
    const days = daysLeft(c.endDate);
    const mode = state.emailEditMode || 'preview';

    if (!state.emailDraft || state.emailDraft.contractId !== c.id) {
      state.emailDraft = {
        contractId: c.id,
        to: `${c.adminEmail}; ${c.companyEmail}`,
        subject: `[ALERT] Contratto in scadenza — ${c.name} (${days} giorni)`,
        body: generateEmailBody(c, days)
      };
    }
    const d = state.emailDraft;

    let content = '';
    if (mode === 'preview') {
      content = `<div class="email-preview">
        <div class="email-header">
          A: ${esc(d.to)}<br>
          Oggetto: ${esc(d.subject)}
        </div>
        <div class="email-body">${esc(d.body).replace(/\n/g, '<br>')}</div>
      </div>`;
    } else {
      content = `<div class="email-edit-field"><label for="em-to">Destinatari</label><input id="em-to" type="text" value="${escAttr(d.to)}" oninput="updateEmailDraft('to', this.value)"></div>
      <div class="email-edit-field"><label for="em-subject">Oggetto</label><input id="em-subject" type="text" value="${escAttr(d.subject)}" oninput="updateEmailDraft('subject', this.value)"></div>
      <div class="email-edit-field"><label for="em-body">Corpo del messaggio</label><textarea id="em-body" oninput="updateEmailDraft('body', this.value)">${esc(d.body)}</textarea></div>`;
    }

    return `<div class="modal-bg" onclick="closeEmailModal()">
      <div class="modal" onclick="event.stopPropagation()" role="dialog" aria-label="Email di notifica" style="width:min(600px,94vw)">
        <h3>Email di notifica${c.employeeName ? ' — ' + esc(c.employeeName) : ''}</h3>
        <div class="email-tabs">
          <button class="email-tab-btn${mode==='preview'?' active':''}" onclick="setEmailTab('preview')">Anteprima</button>
          <button class="email-tab-btn${mode==='edit'?' active':''}" onclick="setEmailTab('edit')">Modifica</button>
        </div>
        ${content}
        <div class="modal-actions">
          <button class="btn-sm" onclick="resetEmailDraft(${c.id})">Ripristina</button>
          <button class="btn-sm" onclick="closeEmailModal()">Chiudi</button>
          ${emailSettings.sendMethod === 'mailto' ? `<button class="btn-sm primary" onclick="realSend(${c.id})">Apri in client email</button>` : ''}
          ${emailSettings.sendMethod === 'emailjs' && isEmailJSConfigured() ? `<button class="btn-sm primary" onclick="realSend(${c.id})">Invia email</button>` : ''}
          ${!isEmailJSConfigured() && emailSettings.sendMethod === 'emailjs' ? `<button class="btn-sm" disabled title="Configura EmailJS nelle impostazioni">EmailJS non configurato</button>` : ''}
        </div>
      </div>
    </div>`;
  }

  function renderConfirmDelete(c) {
    return `<div class="modal-bg" onclick="cancelDelete()">
      <div class="modal" onclick="event.stopPropagation()" role="alertdialog" aria-label="Conferma eliminazione" style="width:min(400px,92vw)">
        <h3>Conferma eliminazione</h3>
        <div class="confirm-body">Eliminare il contratto${c.employeeName ? ' di <strong>' + esc(c.employeeName) + '</strong>' : ''} con <strong>${esc(c.name)}</strong>?<br>Questa azione non è reversibile.</div>
        <div class="modal-actions">
          <button class="btn-sm" onclick="cancelDelete()">Annulla</button>
          <button class="btn-sm danger-confirm" onclick="doDelete(${c.id})">Elimina</button>
        </div>
      </div>
    </div>`;
  }

  function renderCompanyModal() {
    const c = state.editingCompany || {};

    const modalTitle = isEdit ? 'Modifica azienda' : 'Nuova azienda';
    return `<div class="modal-bg" onclick="closeModal()">
      <div class="modal" onclick="event.stopPropagation()" role="dialog" aria-label="${modalTitle}" style="width:min(460px,94vw)">

        <p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:16px">Inserisci i dati dell'azienda. Dopo la creazione potrai aggiungere dipendenti e contratti.</p>
        <div class="form-row single">

        </div>
        <div class="form-row">

          <div class="form-field"><label for="fc-company">Email azienda</label><input id="fc-company" type="email" value="${escAttr(c.companyEmail||'')}" placeholder="contratti@azienda.it"></div>

        <div class="modal-actions">

        </div>
      </div>
    </div>`;
  }

      <div class="modal" onclick="event.stopPropagation()" role="dialog" aria-label="${modalTitle}">

        ${isAddContract ? `<div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:16px;padding:8px 12px;background:var(--color-background-secondary);border-radius:var(--border-radius-md)">Azienda: <strong>${esc(c.name||'')}</strong> — compila i dati del dipendente e del contratto</div>

        ${!isAddContract ? `<div class="form-row">
          <div class="form-field"><label for="f-admin">Email amministratore</label><input id="f-admin" type="email" value="${escAttr(c.adminEmail||'')}" placeholder="admin@esempio.it"></div>
          <div class="form-field"><label for="f-company">Email azienda</label><input id="f-company" type="email" value="${escAttr(c.companyEmail||'')}" placeholder="contratti@azienda.it"></div>

        <div class="form-row">

            <select id="f-renew">

              <option value="no"${c.renewable === false ? ' selected' : ''}>No</option>
            </select>
          </div>
          <div class="form-field"><label for="f-months">Durata proroga (mesi)</label><input id="f-months" type="number" value="${c.renewMonths || calcolaDurataMesi(c.startDate, c.endDate) || ''}" min="1" placeholder="auto"></div>
        </div>
        <div class="form-row">
          <div class="form-field"><label for="f-rtype">Tipo proroga</label>
            <select id="f-rtype">
              <option${c.renewType==='Con causale'?' selected':''}>Con causale</option>
              <option${c.renewType==='Senza causale'?' selected':''}>Senza causale</option>
              <option${c.renewType==='Automatica'?' selected':''}>Automatica</option>

        <div id="causale-live-feedback">${(() => {
          if (c.startDate && c.endDate) {
            const dm = calcolaDurataMesi(c.startDate, c.endDate);
            const pr = c.renewCount || 0;

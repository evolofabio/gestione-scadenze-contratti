<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contratti</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.4/dist/jspdf.plugin.autotable.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --ff: 'DM Sans', sans-serif;
  --fm: 'DM Mono', monospace;
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #f0efe9;
  --surface3: #e8e7e0;
  --text: #1c1c1a;
  --text2: #6b6a65;
  --text3: #a09f9a;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.13);
  --accent: #2a5bd7;
  --accent-bg: #eef2fd;
  --red: #d63c3c;
  --red-bg: #fdf0f0;
  --red-border: #f5c5c5;
  --amber: #c47e0c;
  --amber-bg: #fdf6e7;
  --amber-border: #f0d798;
  --green: #2d8a4e;
  --green-bg: #edf7f1;
  --green-border: #a8ddb9;
  --purple: #6d3fcf;
  --purple-bg: #f3eefb;
  --sidebar-w: 220px;
  --header-h: 56px;
  --radius: 10px;
  --radius-lg: 14px;
  --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.05);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
  --t: 0.18s ease;
}
/* debug rules removed */
[data-theme="dark"] {
  --bg: #131312;
  --surface: #1e1e1c;
  --surface2: #252523;
  --surface3: #2e2e2b;
  --text: #ebebea;
  --text2: #8a8984;
  --text3: #55554f;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --accent: #5580e8;
  --accent-bg: #1a2240;
  --red: #e86060;
  --red-bg: #2a1515;
  --red-border: #5a2020;
  --amber: #e09a30;
  --amber-bg: #2a1f08;
  --amber-border: #5a3f10;
  --green: #4dac6e;
  --green-bg: #0d2218;
  --green-border: #1e5232;
  --purple: #9d74e8;
  --purple-bg: #1f1535;
  --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.2);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.4), 0 2px 8px rgba(0,0,0,0.3);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{
  font-family:var(--ff);
  background:var(--bg);
  color:var(--text);
  height:100%;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  font-size:14px;
}
button{font-family:var(--ff);cursor:pointer}
input,select,textarea{font-family:var(--ff)}
a{color:var(--accent)}
code{font-family:var(--fm);font-size:.85em;background:var(--surface3);padding:1px 5px;border-radius:4px}

/* ═══ LAYOUT ═══ */
.app-shell{display:flex;height:100vh;overflow:hidden}
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow-y:auto;overflow-x:hidden;
  transition:width var(--t), transform var(--t);
  z-index:50;
}
.sidebar.collapsed{width:56px}
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{
  height:var(--header-h);flex-shrink:0;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;
  padding:0 20px;
  position:sticky;top:0;z-index:40;
}
.page-content{flex:1;overflow-y:auto;padding:24px 28px}

/* ═══ SIDEBAR ═══ */
.sidebar-logo{
  display:flex;align-items:center;gap:10px;
  padding:16px 14px 12px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.logo-mark{
  width:30px;height:30px;border-radius:8px;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.logo-mark svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round}
.logo-text{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden}
.sidebar-nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:1px}
.sidebar-section-label{
  font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;
  color:var(--text3);padding:10px 8px 4px;white-space:nowrap;overflow:hidden;
}
.sidebar.collapsed .sidebar-section-label{opacity:0;height:0;padding:0;overflow:hidden}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 8px;border-radius:8px;
  color:var(--text2);font-size:13px;font-weight:400;
  border:none;background:none;width:100%;text-align:left;
  transition:background var(--t),color var(--t);
  white-space:nowrap;overflow:hidden;cursor:pointer;
}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent-bg);color:var(--accent);font-weight:500}
.nav-item svg{width:16px;height:16px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
.nav-item .nav-badge{
  margin-left:auto;font-size:10px;font-weight:600;
  background:var(--red);color:#fff;
  padding:1px 6px;border-radius:99px;flex-shrink:0;
}
.sidebar-companies{padding:0 8px 8px;flex:1}
.company-nav-item{
  display:flex;align-items:center;gap:8px;
  padding:6px 8px;border-radius:7px;
  color:var(--text2);font-size:12px;
  border:none;background:none;width:100%;text-align:left;
  transition:background var(--t),color var(--t);cursor:pointer;
  white-space:nowrap;overflow:hidden;
}
.company-nav-item:hover{background:var(--surface2);color:var(--text)}
.company-nav-item.active{background:var(--accent-bg);color:var(--accent);font-weight:500}
.company-initial{
  width:22px;height:22px;border-radius:6px;
  background:var(--surface3);color:var(--text2);
  font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.company-nav-item.active .company-initial{background:var(--accent-bg);color:var(--accent)}
.sidebar-footer{padding:10px 8px;border-top:1px solid var(--border)}
.toggle-sidebar-btn{
  display:flex;align-items:center;gap:10px;
  padding:7px 8px;border-radius:8px;color:var(--text3);
  font-size:12px;border:none;background:none;width:100%;cursor:pointer;
  transition:background var(--t),color var(--t);
}
.toggle-sidebar-btn:hover{background:var(--surface2);color:var(--text2)}
.toggle-sidebar-btn svg{width:16px;height:16px;flex-shrink:0;stroke:currentColor}

/* ═══ TOPBAR ═══ */
.topbar-title{font-size:15px;font-weight:600;color:var(--text);flex:1}
.topbar-search{
  position:relative;max-width:280px;width:100%;
}
.topbar-search input{
  width:100%;padding:7px 12px 7px 32px;
  font-size:13px;border-radius:8px;
  border:1px solid var(--border2);
  background:var(--surface2);color:var(--text);
  transition:border-color var(--t),box-shadow var(--t),background var(--t);
}
.topbar-search input:focus{
  outline:none;border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(42,91,215,0.12);
  background:var(--surface);
}
.topbar-search input::placeholder{color:var(--text3)}
.topbar-search .si{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  color:var(--text3);pointer-events:none;
}
.topbar-search .si svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.topbar-actions{display:flex;align-items:center;gap:8px}
.tb-btn{
  display:flex;align-items:center;gap:6px;
  padding:7px 13px;font-size:13px;font-weight:500;
  border:1px solid var(--border2);border-radius:8px;
  background:var(--surface);color:var(--text2);
  transition:all var(--t);cursor:pointer;white-space:nowrap;
}
.tb-btn:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.tb-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.tb-btn.primary:hover{opacity:.9}
.tb-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0}
.icon-btn{
  width:34px;height:34px;border-radius:8px;
  border:1px solid var(--border2);background:var(--surface);
  color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all var(--t);position:relative;
}
.icon-btn:hover{background:var(--surface2);color:var(--text)}
.icon-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round}
.notif-badge{
  position:absolute;top:-3px;right:-3px;
  width:16px;height:16px;border-radius:50%;
  background:var(--red);color:#fff;font-size:9px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--surface);
}

/* ═══ SECTIONS ═══ */
.section-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;
}
.section-title{font-size:16px;font-weight:600;color:var(--text)}
.section-sub{font-size:13px;color:var(--text2);margin-top:1px}
.label-tag{
  font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
  color:var(--text3);margin-bottom:10px;display:block;
}

/* ═══ METRICS GRID ═══ */
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.metric-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:16px 18px;
  position:relative;overflow:hidden;
  transition:transform var(--t),box-shadow var(--t);
}
.metric-card:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.metric-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--mc-color,transparent);border-radius:var(--radius-lg) var(--radius-lg) 0 0;
}
.metric-card.m-red{--mc-color:var(--red)}
.metric-card.m-amber{--mc-color:var(--amber)}
.metric-card.m-green{--mc-color:var(--green)}
.metric-card.m-blue{--mc-color:var(--accent)}
.metric-label{font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:400}
.metric-val{font-size:30px;font-weight:300;color:var(--text);line-height:1}
.metric-val.c-red{color:var(--red)}
.metric-val.c-amber{color:var(--amber)}
.metric-val.c-green{color:var(--green)}
.metric-val.c-blue{color:var(--accent)}
.metric-delta{font-size:11px;color:var(--text3);margin-top:6px}

/* ═══ ALERT BANNER ═══ */
.alert-strip{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-radius:var(--radius);
  margin-bottom:8px;font-size:13px;border:1px solid;
  animation:slideDown .2s ease;
}
.alert-strip.danger{background:var(--red-bg);border-color:var(--red-border);color:var(--red)}
.alert-strip.warn{background:var(--amber-bg);border-color:var(--amber-border);color:var(--amber)}
.alert-strip svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}
.alert-text{flex:1}

/* ═══ URGENCY GROUPS ═══ */
.urgency-group{margin-bottom:24px}
.group-header{
  display:flex;align-items:center;gap:8px;
  margin-bottom:10px;padding-bottom:8px;
  border-bottom:1px solid var(--border);
}
.group-title{font-size:12px;font-weight:600,letter-spacing:.04em;text-transform:uppercase;color:var(--text2)}
.group-count{
  font-size:11px;font-weight:600;padding:2px 8px;
  border-radius:99px;background:var(--surface3);color:var(--text2);
}
.group-count.danger{background:var(--red-bg);color:var(--red)}
.group-count.warn{background:var(--amber-bg);color:var(--amber)}
.group-count.ok{background:var(--green-bg);color:var(--green)}

/* ═══ CONTRACT CARD ═══ */
.contract-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);margin-bottom:10px;
  overflow:hidden;transition:box-shadow var(--t),transform var(--t);
  position:relative;
}
.contract-card:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.contract-card.urgent{border-left:3px solid var(--red)}
.contract-card.warning{border-left:3px solid var(--amber)}
.contract-card.ok{border-left:3px solid var(--green)}
.contract-card.expired{border-left:3px solid var(--text3)}
.card-main{padding:14px 16px}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
.card-ident{}
.card-company-name{font-size:15px;font-weight:600;color:var(--text);line-height:1.2}
.card-employee{font-size:13px;color:var(--text2);margin-top:2px}
.card-type{font-size:12px;color:var(--text3);margin-top:1px}
.card-badges{display:flex;gap:5px;align-items:center;flex-wrap:wrap;flex-shrink:0}
.badge{
  font-size:11px;font-weight:500;padding:3px 9px;
  border-radius:99px;white-space:nowrap;
}
.badge-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.badge-amber{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.badge-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.badge-blue{background:var(--accent-bg);color:var(--accent);border:1px solid rgba(42,91,215,.2)}
.badge-gray{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.badge-purple{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(109,63,207,.2)}

/* renew status pill */
.renew-pill{font-size:11px;padding:4px 8px;border-radius:99px;background:var(--surface2);color:var(--text2);border:1px solid var(--border);margin-left:8px;display:inline-block}
.renew-pill.yes{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.renew-pill.no{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.renew-count{font-size:12px;color:var(--text3);margin-top:6px}

/* progress */
.prog-bar{height:3px;background:var(--surface3);border-radius:99px;margin-bottom:12px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .5s ease}
.prog-fill.red{background:var(--red)}
.prog-fill.amber{background:var(--amber)}
.prog-fill.green{background:var(--green)}
.prog-fill.gray{background:var(--text3)}

/* fields row */
.card-fields{
  display:grid;grid-template-columns:repeat(5,1fr);
  gap:10px 14px;margin-bottom:12px;
}
.field-label{font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text3);margin-bottom:2px}
.field-val{font-size:13px;color:var(--text);font-weight:400}
.field-val.c-red{color:var(--red);font-weight:600}
.field-val.c-amber{color:var(--amber);font-weight:600}
.field-val.c-green{color:var(--green)}

/* causale inline */
.causale-inline{
  padding:8px 11px;border-radius:8px;
  font-size:12px;line-height:1.5;margin-bottom:10px;
  display:flex;align-items:flex-start;gap:8px;border:1px solid;
}
.causale-inline.ok{background:var(--green-bg);border-color:var(--green-border);color:var(--green);display:none}
.causale-inline.warn{background:var(--amber-bg);border-color:var(--amber-border);color:var(--amber)}
.causale-inline.err{background:var(--red-bg);border-color:var(--red-border);color:var(--red)}
.causale-inline svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0;margin-top:1px}
.causale-title{font-weight:600}

/* notes */
.card-notes{
  font-size:12px;color:var(--text2);
  background:var(--surface2);border-radius:7px;
  padding:8px 11px;margin-bottom:10px;
  line-height:1.55;
}
.card-notes .notes-label{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);display:block;margin-bottom:3px}

/* cantieri */
.cantieri-inline{margin-bottom:10px}
.cantieri-label{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.cantiere-row{
  display:flex;align-items:center;gap:10px;
  font-size:12px;padding:5px 0;
  border-bottom:1px solid var(--border);
}
.cantiere-row:last-child{border-bottom:none}
.cantiere-nome{flex:1;color:var(--text);font-weight:500}
.cantiere-scad{color:var(--red);font-weight:600;font-size:11px}
.cantiere-scad.ok{color:var(--green)}
.cantiere-note{color:var(--text3);font-style:italic}

/* card actions */
.card-actions{
  display:flex;gap:6px;flex-wrap:wrap;
  padding:10px 16px;background:var(--surface2);
  border-top:1px solid var(--border);
}
.act-btn{
  display:flex;align-items:center;gap:5px;
  font-size:12px;font-weight:500;padding:5px 12px;
  border-radius:7px;border:1px solid var(--border2);
  background:var(--surface);color:var(--text2);
  transition:all var(--t);cursor:pointer;white-space:nowrap;
}
.act-btn:hover{background:var(--surface3);color:var(--text)}
.act-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.act-btn.primary:hover{opacity:.88}
.act-btn.danger{color:var(--red);border-color:var(--red-border)}
.act-btn.danger:hover{background:var(--red-bg)}
.act-btn.quick-renew{color:var(--green);border-color:var(--green-border)}
.act-btn.quick-renew:hover{background:var(--green-bg)}
.act-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}

/* ═══ CALENDAR ═══ */
.calendar-grid{
  display:grid;grid-template-columns:repeat(7,1fr);
  gap:2px;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius-lg);
  overflow:hidden;
}
.cal-header-cell{
  padding:8px 4px;text-align:center;
  font-size:11px;font-weight:600;letter-spacing:.04em;
  color:var(--text2);background:var(--surface2);
}
.cal-day{
  min-height:60px;padding:6px;
  background:var(--surface);
  border-top:1px solid var(--border);
  transition:background var(--t);cursor:pointer;
}
.cal-day:hover{background:var(--surface2)}
.cal-day.today{background:var(--accent-bg)}
.cal-day.other-month .cal-day-num{color:var(--text3)}
.cal-day-num{font-size:12px;font-weight:500;color:var(--text);margin-bottom:3px}
.cal-event{
  font-size:10px;font-weight:500;padding:2px 5px;
  border-radius:4px;margin-bottom:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  cursor:pointer;
}
.cal-event.urgent{background:var(--red-bg);color:var(--red)}
.cal-event.warning{background:var(--amber-bg);color:var(--amber)}
.cal-event.ok{background:var(--green-bg);color:var(--green)}
.cal-event.cantiere{background:var(--purple-bg);color:var(--purple)}
.cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.cal-month-label{font-size:15px;font-weight:600;color:var(--text);flex:1}
.cal-legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.leg-dot{width:10px;height:10px;border-radius:3px}

/* ═══ ANALYTICS ═══ */
.chart-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:18px 20px;
  margin-bottom:16px;
}
.chart-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:14px}

/* ═══ COMPANY VIEW ═══ */
.company-hero{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:18px 22px;
  margin-bottom:16px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  flex-wrap:wrap;
}
.company-avatar{
  width:42px;height:42px;border-radius:10px;
  background:var(--accent-bg);color:var(--accent);
  font-size:16px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.company-info{flex:1}
.company-name{font-size:18px;font-weight:600;color:var(--text)}
.company-meta{font-size:12px;color:var(--text2);margin-top:3px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.company-meta svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}

/* ═══ CANTIERI PAGE ═══ */
.cantiere-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:14px 18px;
  margin-bottom:10px;
  display:flex;align-items:center;gap:16px;
}
.cantiere-urgency-bar{width:4px;flex-shrink:0;height:48px;border-radius:99px;background:var(--green)}
.cantiere-urgency-bar.urgent{background:var(--red)}
.cantiere-urgency-bar.warning{background:var(--amber)}
.cantiere-info{flex:1;min-width:0}
.cantiere-name{font-size:14px;font-weight:600;color:var(--text)}
.cantiere-company{font-size:12px;color:var(--text2)}
.cantiere-right{text-align:right;flex-shrink:0}
.cantiere-days{font-size:20px;font-weight:300;color:var(--text)}
.cantiere-days.urgent{color:var(--red)}
.cantiere-days.warning{color:var(--amber)}
.cantiere-days.ok{color:var(--green)}
.cantiere-days-label{font-size:11px;color:var(--text3)}

/* ═══ SETTINGS ═══ */
.settings-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:20px 22px;margin-bottom:14px;
}
.settings-card h4{font-size:14px;font-weight:600;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.settings-card h4 svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.settings-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.settings-row.triple{grid-template-columns:1fr 1fr 1fr}
.settings-row.single{grid-template-columns:1fr}
.field-group{display:flex;flex-direction:column;gap:5px}
.field-group label{font-size:12px;font-weight:600;color:var(--text2)}
.field-hint{font-size:11px;color:var(--text3);line-height:1.4;margin-top:2px}
.f-input{
  font-size:13px;border-radius:8px;
  border:1px solid var(--border2);
  padding:8px 11px;background:var(--surface);
  color:var(--text);transition:border-color var(--t),box-shadow var(--t);
}
.f-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(42,91,215,.12)}
.f-input::placeholder{color:var(--text3)}
select.f-input{cursor:pointer}
textarea.f-input{resize:vertical;min-height:70px;line-height:1.5}
.toggle-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.toggle-switch{position:relative;width:42px;height:23px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-track{
  position:absolute;inset:0;border-radius:99px;
  background:var(--border2);transition:background .2s;cursor:pointer;
}
.toggle-track::before{
  content:'';position:absolute;height:17px;width:17px;
  left:3px;bottom:3px;background:#fff;border-radius:50%;
  transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);
}
.toggle-switch input:checked + .toggle-track{background:var(--accent)}
.toggle-switch input:checked + .toggle-track::before{transform:translateX(19px)}
.toggle-label{font-size:13px;color:var(--text)}
.status-pill{
  display:inline-flex;align-items:center;gap:5px;
  font-size:12px;font-weight:500;padding:4px 11px;
  border-radius:99px;margin-top:6px;
}
.status-pill.ok{background:var(--green-bg);color:var(--green)}
.status-pill.warn{background:var(--amber-bg);color:var(--amber)}
.status-pill.off{background:var(--surface2);color:var(--text3)}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.status-dot.ok{background:var(--green)}
.status-dot.warn{background:var(--amber)}
.status-dot.off{background:var(--text3)}

/* auto-send day chips */
.day-chips{display:flex;gap:6px;flex-wrap:wrap}
.day-chip{
  font-size:12px;padding:5px 11px;border-radius:99px;
  border:1px solid var(--border2);background:var(--surface2);
  color:var(--text2);cursor:pointer;transition:all var(--t);
}
.day-chip:hover{border-color:var(--accent);color:var(--accent)}
.day-chip.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);font-weight:600}

/* send method radio */
.send-method{display:flex;flex-direction:column;gap:8px}
.method-option{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 12px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface2);cursor:pointer;transition:all var(--t);
}
.method-option:hover{border-color:var(--border2)}
.method-option.active{border-color:var(--accent);background:var(--accent-bg)}
.method-option input{margin-top:2px;accent-color:var(--accent)}
.method-title{font-size:13px;font-weight:500;color:var(--text)}
.method-desc{font-size:11px;color:var(--text2);margin-top:1px}

/* email log */
.log-list{border:1px solid var(--border);border-radius:8px;overflow:hidden}
.log-entry{
  display:flex;align-items:flex-start;gap:10px;
  padding:9px 12px;font-size:12px;
  border-bottom:1px solid var(--border);
  color:var(--text2);
}
.log-entry:last-child{border-bottom:none}
.log-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px}
.log-dot.ok{background:var(--green)}
.log-dot.err{background:var(--red)}
.log-dot.mailto{background:var(--accent)}
.log-info{flex:1}
.log-info strong{color:var(--text);font-weight:500}
.log-time{color:var(--text3);font-size:11px;white-space:nowrap}

/* sync section */
.sync-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}

/* ═══ MODAL ═══ */
.modal-bg{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.35);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;
  z-index:999;animation:fadeIn .2s ease;
}
.modal{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:24px 26px;
  width:min(540px,94vw);max-height:90vh;overflow-y:auto;
  box-shadow:var(--shadow-lg);animation:modalIn .22s ease;
}
.modal-wide{width:min(640px,94vw)}
.modal h3{font-size:17px;font-weight:600;color:var(--text);margin-bottom:18px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:13px}
.form-row.single{grid-template-columns:1fr}
.form-row.triple{grid-template-columns:1fr 1fr 1fr}
.form-field{display:flex;flex-direction:column;gap:4px}
.form-field label{font-size:12px;font-weight:600;color:var(--text2)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.m-btn{
  font-size:13px;font-weight:500;padding:8px 16px;
  border-radius:8px;border:1px solid var(--border2);
  background:var(--surface);color:var(--text2);cursor:pointer;
  transition:all var(--t);
}
.m-btn:hover{background:var(--surface2);color:var(--text)}
.m-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.m-btn.primary:hover{opacity:.88}
.m-btn.danger{background:var(--red);color:#fff;border-color:var(--red)}
.m-btn.danger:hover{opacity:.88}

/* causale live */
#causale-live{margin-bottom:12px}

/* email modal */
.email-tab-row{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:14px}
.email-tab{
  padding:7px 14px;font-size:13px;border:none;
  background:none;cursor:pointer;color:var(--text2);
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:all var(--t);font-family:var(--ff);
}
.email-tab:hover{color:var(--text)}
.email-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.email-preview-box{
  border:1px solid var(--border);border-radius:8px;overflow:hidden;
}
.email-preview-header{
  padding:10px 14px;background:var(--surface2);
  font-size:12px;color:var(--text2);line-height:1.7;
  border-bottom:1px solid var(--border);
}
.email-preview-body{
  padding:14px;font-size:13px;color:var(--text);line-height:1.7;
}
.email-edit-field{margin-bottom:11px}
.email-edit-field label{font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:4px}
.email-edit-field input,.email-edit-field textarea{
  width:100%;font-size:13px;border-radius:8px;
  border:1px solid var(--border2);padding:8px 11px;
  background:var(--surface);color:var(--text);
  font-family:var(--ff);transition:border-color var(--t),box-shadow var(--t);
}
.email-edit-field input:focus,.email-edit-field textarea:focus{
  outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(42,91,215,.12);
}
.email-edit-field textarea{resize:vertical;min-height:160px;line-height:1.6}

/* notification center */
.notif-center{
  position:absolute;top:calc(100% + 8px);right:0;
  width:320px;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);z-index:200;
  animation:modalIn .2s ease;overflow:hidden;
}
.notif-header{
  padding:12px 14px;border-bottom:1px solid var(--border);
  font-size:13px;font-weight:600;color:var(--text);
  display:flex;justify-content:space-between;align-items:center;
}
.notif-item{
  padding:10px 14px;border-bottom:1px solid var(--border);
  transition:background var(--t);cursor:pointer;
}
.notif-item:last-child{border-bottom:none}
.notif-item:hover{background:var(--surface2)}
.notif-item-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:1px}
.notif-item-sub{font-size:12px;color:var(--text2)}
.notif-item .badge{margin-left:8px;vertical-align:middle}
.notif-empty{padding:20px;text-align:center;font-size:13px;color:var(--text3)}

/* export dropdown */
.export-dd{position:relative}
.export-menu{
  position:absolute;top:calc(100% + 6px);right:0;
  min-width:190px;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow-md);z-index:100;overflow:hidden;
  animation:modalIn .15s ease;
}
.export-menu button{
  display:flex;align-items:center;gap:10px;
  width:100%;padding:9px 14px;font-size:13px;
  border:none;background:none;color:var(--text);
  cursor:pointer;font-family:var(--ff);text-align:left;
  transition:background var(--t);
}
.export-menu button:hover{background:var(--surface2)}
.export-menu button svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.75;flex-shrink:0}
.export-menu hr{border:none;border-top:1px solid var(--border);margin:2px 0}

/* quick renew panel */
.quick-renew-panel{
  background:var(--green-bg);border:1px solid var(--green-border);
  border-radius:8px;padding:12px 14px;margin:0 16px 12px;
  display:flex;align-items:center;gap:12px;
  animation:slideDown .2s ease;
}
.qrp-info{flex:1;font-size:13px;color:var(--green)}
.qrp-info strong{font-weight:600}
.qrp-actions{display:flex;gap:6px}
.qrp-btn{
  font-size:12px;font-weight:500;padding:5px 12px;
  border-radius:7px;border:1px solid var(--green-border);
  background:var(--surface);color:var(--green);cursor:pointer;
  transition:all var(--t);
}
.qrp-btn:hover{background:var(--green-bg)}
.qrp-btn.confirm{background:var(--green);color:#fff;border-color:var(--green)}
.qrp-btn.confirm:hover{opacity:.88}

/* login */
.login-screen{
  min-height:100vh;display:flex;align-items:center;
  justify-content:center;background:var(--bg);padding:20px;
}
.login-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);
  padding:36px 32px;max-width:390px;width:100%;
}
.login-logo{
  display:flex;align-items:center;gap:10px;margin-bottom:20px;
}
.login-logo .logo-mark{width:36px;height:36px;border-radius:10px}
.login-logo-text{font-size:16px;font-weight:600;color:var(--text)}
.login-subtitle{font-size:13px;color:var(--text2);margin-bottom:22px}
.login-err{
  background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);
  font-size:12px;font-weight:500;padding:8px 11px;border-radius:7px;
  margin-bottom:13px;display:none;
}
.login-toggle-link{margin-top:14px;text-align:center;font-size:13px;color:var(--text3)}
.login-toggle-link a{color:var(--accent);cursor:pointer;font-weight:500;text-decoration:none}
.login-toggle-link a:hover{text-decoration:underline}
.pw-wrap{position:relative}
.pw-wrap input{width:100%;padding-right:38px}
.pw-eye{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;
}
.pw-eye:hover{color:var(--text2)}
.pw-eye svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;display:block}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .5s linear infinite;vertical-align:middle;margin-right:5px}

/* ═══ TOAST ═══ */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--text);color:var(--surface);
  padding:9px 18px;border-radius:8px;font-size:13px;font-weight:500;
  z-index:2000;box-shadow:var(--shadow-lg);pointer-events:none;
  animation:toastIn .25s ease, toastOut .3s ease 2s forwards;
}

/* ═══ EMPTY STATE ═══ */
.empty-state{
  text-align:center;padding:3rem 1rem;
  color:var(--text3);font-size:14px;
}
.empty-state svg{margin-bottom:12px;opacity:.4;display:block;margin-left:auto;margin-right:auto}

/* ═══ SCROLLBAR ═══ */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* ═══ ANIMATIONS ═══ */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(6px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ═══ MOBILE ═══ */
@media(max-width:900px){
  .metrics-grid{grid-template-columns:1fr 1fr}
  .card-fields{grid-template-columns:repeat(3,1fr)}
  .sync-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:640px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:60;transform:translateX(-100%)}
  .sidebar.mobile-open{transform:translateX(0)}
  .page-content{padding:16px}
  .metrics-grid{grid-template-columns:1fr 1fr;gap:8px}
  .card-fields{grid-template-columns:1fr 1fr}
  .form-row{grid-template-columns:1fr}
  .settings-row{grid-template-columns:1fr}
  .settings-row.triple{grid-template-columns:1fr}
  .sync-grid{grid-template-columns:1fr}
}
@media print{
  .sidebar,.topbar,.card-actions{display:none!important}
  .contract-card{break-inside:avoid;box-shadow:none}
  .modal-bg{display:none!important}
}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
</style>
</head>

        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Dashboard</span>
      </button>
      <button class="nav-item" id="nav-calendar" onclick="setPage('calendar')">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>

      </button>
      <button class="nav-item" id="nav-cantieri" onclick="setPage('cantieri')">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>

        <span>Impostazioni</span>
      </button>
      <span class="sidebar-section-label" style="margin-top:8px">Aziende</span>
    </div>
    <div class="sidebar-companies" id="sidebar-companies"></div>
    <div class="sidebar-footer">
      <button class="toggle-sidebar-btn" onclick="toggleSidebar()" id="sidebar-toggle-btn">
        <svg viewBox="0 0 24 24" id="sidebar-toggle-icon"><path d="M15 18l-6-6 6-6"/></svg>
        <span id="sidebar-toggle-label">Comprimi</span>
      </button>
    </div>
  </nav>

  <div class="main-area">
    <header class="topbar">
      <button class="icon-btn" onclick="toggleMobileSidebar()" id="mobile-menu-btn" style="display:none">
        <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div class="topbar-search" id="topbar-search-wrap">
        <span class="si"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <input type="text" placeholder="Cerca contratti…" id="search-input" oninput="onSearch(this.value)">
      </div>
      <div class="topbar-actions">
        <div class="export-dd" id="export-dd">
          <button class="tb-btn" onclick="toggleExportMenu(event)">
            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Esporta
          </button>

<script>
'use strict';
// ═══════════════════════════════════════
// CONSTANTS & STORAGE
// ═══════════════════════════════════════
const ALERT_DAYS = 6;
const SK = { data:'cm2_data', settings:'cm2_settings', log:'cm2_log', sent:'cm2_sent', sync:'cm2_sync', auth:'cm2_auth', theme:'cm2_theme' };

function esc(s){if(!s)return'';const m={'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"};return String(s).replace(/[&<>"']/g,c=>m[c])}
function escAttr(s){return esc(s)}

// ═══════════════════════════════════════
// DEFAULT DATA
// ═══════════════════════════════════════
function mkDate(d){const x=new Date();x.setDate(x.getDate()+d);return x.toISOString().split('T')[0]}

function defaultData(){return[
  {id:1,name:'Acme S.r.l.',employeeName:'Marco Bianchi',contractType:'Fornitura servizi IT',startDate:'2023-04-15',endDate:mkDate(4),renewable:true,renewMonths:12,renewType:'Senza causale',renewNotice:30,renewCount:2,adminEmail:'admin@example.com',companyEmail:'contratti@acme.it',notes:'Rinnovo automatico salvo disdetta. Verificare aggiornamento prezzi.',cantieri:[{nome:'Cantiere Milano',scadenza:mkDate(10),note:'Verifica sicurezza'},{nome:'Cantiere Roma',scadenza:mkDate(30),note:''}]},
  {id:4,name:'Acme S.r.l.',employeeName:'Laura Verdi',contractType:'Supporto tecnico',startDate:'2024-01-10',endDate:mkDate(45),renewable:true,renewMonths:6,renewType:'Automatica',renewNotice:15,renewCount:0,adminEmail:'admin@example.com',companyEmail:'contratti@acme.it',notes:'Contratto supporto tecnico on-site.',cantieri:[]},
  {id:2,name:'Beta Solutions S.p.A.',employeeName:'Giuseppe Neri',contractType:'Contratto di appalto',startDate:'2022-01-10',endDate:mkDate(18),renewable:true,renewMonths:6,renewType:'Con causale',renewNotice:60,renewCount:1,adminEmail:'admin@example.com',companyEmail:'legal@beta.it',notes:'Proroga subordinata a valutazione performance.',cantieri:[{nome:'Cantiere Napoli',scadenza:mkDate(60),note:'Controllo documenti'}]},
  {id:3,name:'Gamma Trade S.r.l.',employeeName:'Anna Russo',contractType:'Accordo commerciale',startDate:'2024-06-01',endDate:mkDate(90),renewable:false,renewMonths:0,renewType:'',renewNotice:0,renewCount:0,adminEmail:'admin@example.com',companyEmail:'info@gamma.it',notes:'Contratto a termine fisso, non prorogabile.',cantieri:[]}
]} 

function defaultSettings(){return{sendMethod:'mailto',emailjs:{serviceId:'',templateId:'',publicKey:''},autoSend:{enabled:false,daysBeforeExpiry:[30,15,7,3,1],checkIntervalMinutes:60}}}
function defaultSync(){return{enabled:false,apiKey:'',databaseURL:'',roomName:''}}
function defaultAuth(){return{apiKey:'',authDomain:''}}

function save(key,val){try{localStorage.setItem(key,JSON.stringify(val))}catch(e){} }
function load(key,def){try{const r=localStorage.getItem(key);if(r!==null)return JSON.parse(r)}catch(e){}return typeof def==='function'?def():def}

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let state={
  page:'dashboard',
  companies:load(SK.data,defaultData),
  searchQuery:'',
  sortBy:'urgency',
  filterMonth:'',
  activeCompany:null,
  calYear:new Date().getFullYear(),
  calMonth:new Date().getMonth(),
  expandedCard:null,
  quickRenewId:null,
  quickRenewMonths:{},
  showExportMenu:false,
  showNotifCenter:false,
  theme:load(SK.theme,'light'),
  sidebarCollapsed:false,
};
let emailSettings=load(SK.settings,defaultSettings);
let emailLog=load(SK.log,[]);
let sentTracker=load(SK.sent,{});
let syncConfig=load(SK.sync,defaultSync);
let syncState={connected:false,lastSync:null,listener:null,db:null,skipNext:false};
let authUser=null,authFirebaseApp=null;
let autoSendInterval=null;


// Inizializza Firebase App principale se non già presente
function ensureFirebaseApp() {
  if (!window.firebase || (firebase.apps && firebase.apps.length > 0)) return;
  // Configurazione di default: usa authConfig se presente, altrimenti syncConfig
  var config = null;
  if (typeof defaultAuth === 'function') {
    config = load(SK.auth, defaultAuth);
  } else if (typeof defaultSync === 'function') {
    config = load(SK.sync, defaultSync);
  }
  if (config && config.apiKey && config.authDomain && config.databaseURL) {
    firebase.initializeApp({
      apiKey: config.apiKey,
      authDomain: config.authDomain,
      databaseURL: config.databaseURL
    });
  }
}
ensureFirebaseApp();
applyTheme(state.theme);

// Normalize cantieri so they are stored per azienda (first contract entry) and deduplicated
function normalizeCompanyCantieri(){
  try{
    const map={};
    state.companies.forEach(c=>{
      const name=c.name||'';
      if(!map[name])map[name]={seen:new Set(),cantieri:[]};
      if(Array.isArray(c.cantieri)){
        c.cantieri.forEach(ct=>{
          const key=((ct.nome||'').trim().toLowerCase())+'|'+(ct.scadenza||'');
          if(!map[name].seen.has(key)){map[name].seen.add(key);map[name].cantieri.push({nome:ct.nome,scadenza:ct.scadenza,note:ct.note||''})}
        });
      }
    });
    const seenFirst={};
    state.companies.forEach(c=>{
      const name=c.name||'';
      if(!seenFirst[name]){seenFirst[name]=true;c.cantieri=(map[name]&&map[name].cantieri.length)?map[name].cantieri.slice():[]}
      else{c.cantieri=[]}
    });
  }catch(e){console.error('normalizeCompanyCantieri',e)}
}
normalizeCompanyCantieri();

// ═══════════════════════════════════════
// THEME
// ═══════════════════════════════════════
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  save(SK.theme,t);
  const icon=document.getElementById('theme-icon');
  if(icon)icon.innerHTML=t==='dark'
    ?'<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
    :'<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>';
}

function toggleTheme(){state.theme=state.theme==='dark'?'light':'dark';applyTheme(state.theme)}

// ═══════════════════════════════════════
// DATE HELPERS
// ═══════════════════════════════════════
function daysLeft(d){if(!d) return 9999;const t=new Date();t.setHours(0,0,0,0);const e=new Date(d);e.setHours(0,0,0,0);return Math.round((e-t)/86400000)}
function formatDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric'})}
function durationMonths(s,e){if(!s||!e)return 0;const a=new Date(s),b=new Date(e);return(b.getFullYear()-a.getFullYear())*12+(b.getMonth()-a.getMonth())+(b.getDate()>a.getDate()?1:0)}
function remainingMonths(e){if(!e)return 0;const t=new Date();t.setHours(0,0,0,0);const b=new Date(e);b.setHours(0,0,0,0);if(b<=t)return 0;return(b.getFullYear()-t.getFullYear())*12+(b.getMonth()-t.getMonth())+(b.getDate()>t.getDate()?1:0)}
function progressPct(s,e){if(!s||!e)return 0;const total=new Date(e)-new Date(s);const elapsed=Date.now()-new Date(s);return Math.min(100,Math.max(0,(elapsed/total)*100))}

// ═══════════════════════════════════════
// URGENCY
// ═══════════════════════════════════════
function urgClass(days){if(days<0)return'expired';if(days<=ALERT_DAYS)return'urgent';if(days<=30)return'warning';return'ok'}
function urgBadge(days){
  if(days<0)return{cls:'badge-gray',txt:'Scaduto'};
  if(days<=ALERT_DAYS)return{cls:'badge-red',txt:days+'gg'};
  if(days<=15)return{cls:'badge-amber',txt:days+'gg'};
  if(days<=30)return{cls:'badge-amber',txt:days+'gg'};
  return{cls:'badge-green',txt:days+'gg'};
}
function daysCls(days){if(days<0||days<=ALERT_DAYS)return'c-red';if(days<=30)return'c-amber';return'c-green'}
function progCls(days){if(days<0)return'gray';if(days<=ALERT_DAYS)return'red';if(days<=30)return'amber';return'green'}

// ═══════════════════════════════════════
// CAUSALE CHECK
// ═══════════════════════════════════════
function verificaCausale(durMesi,proroghe,causale){
  durMesi=parseInt(durMesi)||0;proroghe=parseInt(proroghe)||0;causale=!!causale;
  if(proroghe>4)return{stato:'ERRORE',msg:'Superato il limite di 4 proroghe ('+proroghe+' effettuate). Il contratto è da considerarsi a tempo indeterminato.',azione:'Convertire a tempo indeterminato o regolarizzare.'};
  if(durMesi>24)return{stato:'ERRORE',msg:'Durata totale ('+durMesi+' mesi) supera il massimo di 24 mesi.',azione:'Ridurre durata a massimo 24 mesi o convertire a T.I.'};
  if(durMesi>12&&!causale)return{stato:'ERRORE',msg:'Durata >12 mesi ('+durMesi+') senza causale. Causale obbligatoria.',azione:'Inserire causale valida o ridurre durata a ≤12 mesi.'};
  if(durMesi===12&&!causale)return{stato:'ATTENZIONE',msg:'Durata al limite massimo (12 mesi) senza causale.',azione:'Qualsiasi estensione richiederà causale obbligatoria.'};
  if(proroghe===4)return{stato:'ATTENZIONE',msg:'Raggiunto il numero massimo di proroghe (4/4).',azione:'Non è possibile ulteriori proroghe. Valutare conversione T.I.'};
  if(durMesi>=22)return{stato:'ATTENZIONE',msg:'Durata ('+durMesi+' mesi) vicina al limite di 24 mesi.',azione:'Pianificare chiusura o conversione prima dei 24 mesi.'};
  if(proroghe===3)return{stato:'ATTENZIONE',msg:'Effettuate 3 proroghe su 4 massime.',azione:'Resta una sola proroga disponibile.'};
  return{stato:'OK',msg:'Conforme: '+durMesi+' mesi, '+proroghe+'/4 proroghe'+(causale?' con causale':'' )+'.',azione:'Nessuna azione richiesta.'};
}
function causaleForContract(c){if(!c||!c.startDate||!c.endDate)return null;return verificaCausale(durationMonths(c.startDate,c.endDate),c.renewCount||0,c.renewType==='Con causale')}

// ═══════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════
function renderSidebarCompanies(){
  const el=document.getElementById('sidebar-companies');
  if(!el)return;
  const names=[...new Set(state.companies.map(c=>c.name))];
  el.innerHTML=names.map(n=>{
    const active=state.page==='company'&&state.activeCompany===n;
    const init=n.substring(0,2).toUpperCase();
    return`<button class="company-nav-item${active?' active':''}" onclick="setCompanyPage('${escAttr(n)}')" title="${escAttr(n)}">
      <span class="company-initial">${init}</span>
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(n)}</span>
    </button>`;
  }).join('');
}

function toggleSidebar(){
  state.sidebarCollapsed=!state.sidebarCollapsed;
  const sb=document.getElementById('sidebar');
  const lbl=document.getElementById('sidebar-toggle-label');
  const icon=document.getElementById('sidebar-toggle-icon');
  if(state.sidebarCollapsed){
    sb.classList.add('collapsed');
    if(lbl)lbl.style.display='none';
    if(icon)icon.innerHTML='<path d="M9 18l6-6-6-6"/>';
  }else{
    sb.classList.remove('collapsed');
    if(lbl){lbl.style.display='';lbl.textContent='Comprimi'}
    if(icon)icon.innerHTML='<path d="M15 18l-6-6 6-6"/>';
  }
}
function toggleMobileSidebar(){
  const sb=document.getElementById('sidebar');
  sb.classList.toggle('mobile-open');
}

// ═══════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════
function setPage(p,company){
  state.page=p;
  state.activeCompany=company||null;
  state.searchQuery='';
  state.quickRenewId=null;
  document.getElementById('search-input').value='';
  updateNav();
  renderSidebarCompanies();
  renderPage();
}
function setCompanyPage(name){setPage('company',name)}

function updateNav(){
  ['dashboard','calendar','cantieri','analytics','settings'].forEach(p=>{
    const el=document.getElementById('nav-'+p);
    if(el)el.className=`nav-item${state.page===p?' active':''}`;
  });
  const titles={dashboard:'Dashboard',calendar:'Calendario',cantieri:'Cantieri',analytics:'Analytics',settings:'Impostazioni',company:state.activeCompany||'Azienda'};
  const el=document.getElementById('topbar-title');
  if(el)el.textContent=titles[state.page]||'';
  const sw=document.getElementById('topbar-search-wrap');
  if(sw)sw.style.display=(['dashboard','company'].includes(state.page))?'':'none';
  // update small nav badges (cantieri count) and notification badge
  try{
    const seenCompany={};
    const cantieriCount = state.companies.flatMap(c=>{
      if(seenCompany[c.name]) return [];
      seenCompany[c.name]=true;
      return Array.isArray(c.cantieri)?c.cantieri:[];
    }).length;
    const cb=document.getElementById('cantieri-badge');
    if(cb){
      if(cantieriCount>0){cb.style.display='';cb.textContent=String(cantieriCount)}
      else{cb.style.display='none';cb.textContent='0'}
    }
    const urgentCount = state.companies.filter(c=>typeof c.endDate!=='undefined' && daysLeft(c.endDate) <= ALERT_DAYS).length;
    const nb=document.getElementById('notif-badge');
    if(nb){
      if(urgentCount>0){nb.style.display='';nb.textContent=String(urgentCount)}
      else{nb.style.display='none';nb.textContent='0'}
    }
  }catch(e){console.error('updateNav badges',e)}
}

// ═══════════════════════════════════════
// NOTIFICATIONS
// ═══════════════════════════════════════
function renderCantieriPage(){
  // Only show cantieri from the canonical company record (first contract per azienda)
  const seenCompany = {};
  const all = state.companies.flatMap(c => {
    if (seenCompany[c.name]) return [];
    seenCompany[c.name] = true;
    return (c.cantieri||[]).map((ct,idx) => ({...ct, company: c, _idx: idx, _contractId: c.id}));
  });
  all.sort((a,b)=>daysLeft(a.scadenza)-daysLeft(b.scadenza));
  if(!all.length) return `<div class="empty-state"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>Nessun cantiere registrato.<br><br><button class="tb-btn primary" onclick="openAddCantiereGlobal()">+ Aggiungi cantiere</button></div>`;

  const groups=[
    {label:'Scaduti',items:all.filter(ct=>daysLeft(ct.scadenza)<0),cls:'danger'},
    {label:'Urgenti — entro 7 giorni',items:all.filter(ct=>{const d=daysLeft(ct.scadenza);return d>=0&&d<=7}),cls:'danger'},
    {label:'In scadenza — entro 30 giorni',items:all.filter(ct=>{const d=daysLeft(ct.scadenza);return d>7&&d<=30}),cls:'warn'},
    {label:'Regolari',items:all.filter(ct=>daysLeft(ct.scadenza)>30),cls:'ok'},
  ];

  let h=`<div class="section-head" style="align-items:center">
    <div class="section-title">Cantieri (${all.length})</div>
    <div><button class="tb-btn primary" onclick="openAddCantiereGlobal()">+ Aggiungi cantiere</button></div>
  </div>`;
  groups.forEach(g=>{
    if(!g.items.length)return;
    h+=`<div class="urgency-group">
      <div class="group-header"><span class="group-title">${g.label}</span><span class="group-count ${g.cls}">${g.items.length}</span></div>
      ${g.items.map(ct=>{
        const d=daysLeft(ct.scadenza);
        const uc=d<0||d<=7?'urgent':d<=30?'warning':'ok';
        return `<div class="cantiere-card">
            <div class="cantiere-urgency-bar ${uc}"></div>
            <div class="cantiere-info">
              <div class="cantiere-name">${esc(ct.nome)}</div>
              <div class="cantiere-company">${esc(ct.company.name)}</div>
              ${ct.note?`<div style="font-size:11px;color:var(--text3);margin-top:2px;font-style:italic">${esc(ct.note)}</div>`:''}
            </div>
            <div class="cantiere-right">
              <div class="cantiere-days ${uc}">${d<0?'Sc.':d}</div>
              <div class="cantiere-days-label">${d<0?'scaduto':'giorni'}</div>
              <div style="font-size:11px;color:var(--text2);margin-top:2px">${formatDate(ct.scadenza)}</div>
              <div style="margin-top:8px;display:flex;gap:8px;justify-content:flex-end">
                <button class="act-btn" onclick="openEditCantiere(${ct.company.id},${ct._idx})">Modifica</button>
                <button class="act-btn danger" onclick="confirmDeleteCantiere(${ct.company.id},${ct._idx})">Elimina</button>
              </div>
            </div>
          </div>`;
      }).join('')}
    </div>`;
  });
  return h;
}

// Open modal showing all events (contracts + cantieri) for a specific day
window.openDayEvents=function(dateStr){
  const items=[];
  state.companies.forEach(c=>{
    if(c.endDate===dateStr)items.push({type:'contratto',label:`${c.name}${c.employeeName?' — '+c.employeeName:''}`,detail:`Scadenza contratto: ${formatDate(c.endDate)}`,contractId:c.id});
    (c.cantieri||[]).forEach(ct=>{if(ct.scadenza===dateStr)items.push({type:'cantiere',label:`${ct.nome}`,detail:`Cantiere per ${c.name}${c.employeeName?' — '+c.employeeName:''}`,contractId:c.id,cantiereIdx:c.cantieri.indexOf(ct)})});
  });
  if(!items.length){showToast('Nessuna scadenza per il giorno selezionato');return}
  const list=items.map(it=>{
    const actions=[];
    if(it.type==='contratto')actions.push(`<button class="m-btn" onclick="hideModal();openEditModal(${it.contractId})">Modifica contratto</button>`);
    if(it.type==='cantiere')actions.push(`<button class="m-btn" onclick="hideModal();openEditCantiere(${it.contractId},${it.cantiereIdx})">Modifica cantiere</button>`);
    return `<div style="padding:10px 0;border-bottom:1px dashed var(--border);display:flex;gap:12px;align-items:center">
      <div style="flex:1"><div style="font-weight:600">${esc(it.label)}</div><div style="font-size:12px;color:var(--text3);margin-top:4px">${esc(it.detail)}</div></div>
      <div style="display:flex;gap:8px">${actions.join('')}</div>
    </div>`;
  }).join('');
  showModal(`<div class="modal-bg" onclick="hideModal()"><div class="modal" onclick="event.stopPropagation()" style="max-width:680px">
    <h3>Scadenze del ${formatDate(dateStr)}</h3>
    <div style="max-height:360px;overflow:auto;padding-top:6px">${list}</div>
    <div class="modal-actions"><button class="m-btn" onclick="hideModal()">Chiudi</button></div>
  </div></div>`);
}

// Global add cantiere (from Cantieri page)
window.openAddCantiereGlobal=function(){
  // build a select of unique companies (use first contract id as canonical)
  const seen={};
  const opts=state.companies.reduce((a,c)=>{if(!seen[c.name]){seen[c.name]=true;a.push(`<option value="${c.id}">${esc(c.name)}</option>`)}return a},[]).join('');
  showModal(`<div class="modal-bg" onclick="hideModal()"><div class="modal" onclick="event.stopPropagation()" style="max-width:520px">

window.saveModalCantiereGlobal=function(){
  const companyId=parseInt((document.getElementById('mc-company')||{}).value,10);
  const nome=(document.getElementById('mc-nome')||{}).value?.trim();
  const scad=(document.getElementById('mc-scad')||{}).value;
  const note=(document.getElementById('mc-note')||{}).value?.trim()||'';
  if(!companyId||!nome||!scad){showToast('Seleziona azienda, inserisci nome e data');return}
  const c=state.companies.find(x=>x.id===companyId);
  if(!c)return showToast('Azienda non trovata');
  if(!Array.isArray(c.cantieri))c.cantieri=[];
  // avoid duplicates by nome+scadenza
  const key=((nome||'').trim().toLowerCase())+'|'+scad;
  const exists=c.cantieri.some(ct=>((ct.nome||'').trim().toLowerCase())+'|'+(ct.scadenza||'')===key);
  if(exists){showToast('Cantiere già presente per questa azienda');return}
  c.cantieri.push({nome,scadenza:scad,note:note||''});
  saveData();hideModal();renderPage();showToast('Cantiere aggiunto');
}

function renderAnalyticsPage(){
  // Scadenze per mese (prossimi 12 mesi)
  const now=new Date();
  const monthLabels=[];const monthData=[];
  for(let i=0;i<12;i++){
    const d=new Date(now.getFullYear(),now.getMonth()+i,1);
    monthLabels.push(d.toLocaleString('it-IT',{month:'short',year:'2-digit'}));
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    monthData.push(state.companies.filter(c=>c.endDate&&c.endDate.startsWith(key)).length);
  }
  // Tipo contratto
  const typeMap={};
  state.companies.forEach(c=>{const t=c.contractType||'Altro';typeMap[t]=(typeMap[t]||0)+1});
  const typeLabels=Object.keys(typeMap);const typeData=typeMap;

  const expired=state.companies.filter(c=>daysLeft(c.endDate)<0).length;
  const urgent=state.companies.filter(c=>{const d=daysLeft(c.endDate);return d>=0&&d<=30}).length;
  const renewable=state.companies.filter(c=>c.renewable).length;
  const avgDur=state.companies.length?Math.round(state.companies.reduce((s,c)=>s+durationMonths(c.startDate,c.endDate),0)/state.companies.length):0;

  return`<div class="metrics-grid" style="margin-bottom:20px">
    <div class="metric-card"><div class="metric-label">Durata media</div><div class="metric-val">${avgDur}<span style="font-size:16px;font-weight:400"> mesi</span></div></div>
    <div class="metric-card"><div class="metric-label">Prorogabili</div><div class="metric-val c-blue">${renewable}</div><div class="metric-delta">su ${state.companies.length} totali</div></div>
    <div class="metric-card m-amber"><div class="metric-label">In scadenza 30gg</div><div class="metric-val c-amber">${urgent}</div></div>
    <div class="metric-card m-red"><div class="metric-label">Scaduti</div><div class="metric-val c-red">${expired}</div></div>
  </div>
  <div class="chart-card">
    <div class="chart-title">Scadenze per mese (prossimi 12 mesi)</div>
    <canvas id="chart-monthly" height="200"></canvas>
  </div>
  <div class="chart-card">
    <div class="chart-title">Distribuzione per tipo contratto</div>
    <canvas id="chart-types" height="200"></canvas>
  </div>
  <script id="chart-data" type="application/json">${JSON.stringify({monthLabels,monthData,typeLabels:Object.keys(typeMap),typeData:Object.values(typeMap)})}<\/script>`;
}

function initCharts(){
  const raw=document.getElementById('chart-data');
  if(!raw||!window.Chart)return;
  let d;try{d=JSON.parse(raw.textContent)}catch(e){return}

  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  const grid=isDark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.07)';
  const text=isDark?'#8a8984':'#6b6a65';
  Chart.defaults.font.family="'DM Sans', sans-serif";
  Chart.defaults.color=text;

  const mc=document.getElementById('chart-monthly');
  if(mc&&!mc._chart){
    mc._chart=new Chart(mc,{
      type:'bar',
      data:{labels:d.monthLabels,datasets:[{label:'Contratti in scadenza',data:d.monthData,backgroundColor:isDark?'rgba(85,128,232,.5)':'rgba(42,91,215,.5)',borderColor:isDark?'#5580e8':'#2a5bd7',borderWidth:1,borderRadius:4}]},
      options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{grid:{color:grid}},y:{grid:{color:grid},ticks:{stepSize:1},beginAtZero:true}}}
    });
  }

  const tc=document.getElementById('chart-types');
  if(tc&&!tc._chart&&d.typeLabels.length){
    const colors=['#2a5bd7','#2d8a4e','#c47e0c','#d63c3c','#6d3fcf','#c47e0c'];
    tc._chart=new Chart(tc,{
      type:'doughnut',
      data:{labels:d.typeLabels,datasets:[{data:d.typeData,backgroundColor:colors.slice(0,d.typeLabels.length),borderWidth:0}]},
      options:{responsive:true,plugins:{legend:{position:'right'}}}
    });
  }
}

window.saveCompany=function(){
  const name=(document.getElementById('ac-name')||{}).value?.trim();
  const admin=(document.getElementById('ac-admin')||{}).value?.trim();
  const company=(document.getElementById('ac-company')||{}).value?.trim();
  const notes=(document.getElementById('ac-notes')||{}).value?.trim()||'';
  if(!name){showToast('Inserisci il nome dell\'azienda');return}
  // prevent duplicate company name
  const exists=state.companies.some(c=>c.name===name);
  if(exists){showToast('Azienda già registrata');return}
  const newId=Math.max(0,...state.companies.map(c=>c.id||0))+1;
  state.companies.push({id:newId,name,employeeName:'',contractType:'',startDate:'',endDate:'',renewable:false,renewMonths:12,renewType:'',renewNotice:30,renewCount:0,adminEmail:admin,companyEmail:company,notes,cantieri:[]});

  showToast('Azienda registrata');
}

window.saveEditedCompany=function(oldName){
  const newName=(document.getElementById('ec-name')||{}).value?.trim();
  const admin=(document.getElementById('ec-admin')||{}).value?.trim();
  const company=(document.getElementById('ec-company')||{}).value?.trim();
  const notes=(document.getElementById('ec-notes')||{}).value?.trim()||'';
  if(!newName){showToast('Inserisci il nome dell\'azienda');return}
  if(newName!==oldName && state.companies.some(c=>c.name===newName)){showToast('Esiste già un\'altra azienda con lo stesso nome');return}
  state.companies=state.companies.map(c=>c.name===oldName?{...c,name:newName,adminEmail:admin,companyEmail:company,notes}:c);
  // If we were viewing the old company page, keep showing the updated company
  if(state.activeCompany===oldName){

  }else{
    hideModal();saveData();renderPage();renderSidebarCompanies();

  showToast('Azienda aggiornata');
}

window.saveModalCantiere=function(id,idx){
  const nome=(document.getElementById('mc-nome')||{}).value?.trim();
  const scad=(document.getElementById('mc-scad')||{}).value;
  const note=(document.getElementById('mc-note')||{}).value?.trim()||'';
  if(!nome||!scad){showToast('Inserisci nome e data');return}
  const original=state.companies.find(x=>x.id===id);
  if(!original)return;
  // operate on canonical company record (first contract with same name)
  const c=state.companies.find(x=>x.name===original.name) || original;
  if(!Array.isArray(c.cantieri))c.cantieri=[];
  if(idx===null||idx===undefined){
    const key=((nome||'').trim().toLowerCase())+'|'+scad;
    if(c.cantieri.some(ct=>((ct.nome||'').trim().toLowerCase())+'|'+(ct.scadenza||'')===key)){showToast('Cantiere già presente per questa azienda');return}
    c.cantieri.push({nome,scadenza:scad,note:note||''});
    saveData();hideModal();renderPage();showToast('Cantiere aggiunto');
  }else{
    if(!c.cantieri[idx]){showToast('Cantiere non trovato');return}
    c.cantieri[idx]=Object.assign({},c.cantieri[idx],{nome,scadenza:scad,note});
    saveData();hideModal();renderPage();showToast('Cantiere aggiornato');
  }
}

// Edit / Delete cantieri
window.openEditCantiere=function(contractId,idx){

// Calendar rendering (basic month view with contract + cantiere events)
function changeCalendarMonth(offset){
  let m = (typeof state.calMonth==='number')?state.calMonth:new Date().getMonth();
  let y = (typeof state.calYear==='number')?state.calYear:new Date().getFullYear();
  m += offset;
  if(m<0){m=11;y-=1}else if(m>11){m=0;y+=1}
  state.calMonth=m;state.calYear=y;renderPage();
}

function renderCalendarPage(){
  const month = (typeof state.calMonth==='number')?state.calMonth:new Date().getMonth();
  const year = (typeof state.calYear==='number')?state.calYear:new Date().getFullYear();
  const first = new Date(year,month,1);
  const lead = first.getDay();
  const daysInMonth = new Date(year,month+1,0).getDate();
  const totalCells = Math.max(42, lead + daysInMonth);

  // collect events by day (include contract id and cantiere index so events are clickable)
  const eventsMap = {};
  state.companies.forEach(c=>{
    if(c.endDate && String(c.endDate).startsWith(`${year}-${String(month+1).padStart(2,'0')}`)){
      const d = parseInt(String(c.endDate).split('-')[2],10);
      (eventsMap[d] = eventsMap[d]||[]).push({type:'contract',contractId:c.id,title:`${c.employeeName||c.name} — ${c.name}`,urg:daysLeft(c.endDate)});
    }
    if(Array.isArray(c.cantieri)){
      c.cantieri.forEach((ct,idx)=>{
        if(ct.scadenza && String(ct.scadenza).startsWith(`${year}-${String(month+1).padStart(2,'0')}`)){
          const d = parseInt(String(ct.scadenza).split('-')[2],10);
          (eventsMap[d] = eventsMap[d]||[]).push({type:'cantiere',contractId:c.id,idx:idx,title:`${ct.nome} — ${c.name}`,urg:daysLeft(ct.scadenza)});
        }
      });
    }
  });

  let html = `<div class="cal-nav"><button class="tb-btn" onclick="changeCalendarMonth(-1)">◀</button><div class="cal-month-label">${new Date(year,month,1).toLocaleString('it-IT',{month:'long',year:'numeric'})}</div><button class="tb-btn" onclick="changeCalendarMonth(1)">▶</button></div>`;
  html += `<div class="calendar-grid"><div class="cal-header-cell">Dom</div><div class="cal-header-cell">Lun</div><div class="cal-header-cell">Mar</div><div class="cal-header-cell">Mer</div><div class="cal-header-cell">Gio</div><div class="cal-header-cell">Ven</div><div class="cal-header-cell">Sab</div>`;
  for(let i=0;i<totalCells;i++){
    const day = i - lead + 1;
    if(day<1 || day>daysInMonth){
      html += `<div class="cal-day other-month"><div class="cal-day-num"></div></div>`;
    }else{
      const dateObj = new Date(year,month,day);
      const isToday = (new Date()).toDateString()===dateObj.toDateString();
      const evs = eventsMap[day]||[];
      const cls = `cal-day${isToday? ' today':''}`;
      html += `<div class="${cls}"><div class="cal-day-num">${day}</div>` + evs.map(ev=>{
        const evCls = ev.type==='cantiere' ? 'cantiere' : (ev.urg<=0 ? 'urgent' : (ev.urg<=15 ? 'warning' : 'ok'));
        const onclick = ev.type==='contract' ? `onCalendarEventClick(${ev.contractId},null,'contract')` : `onCalendarEventClick(${ev.contractId},${ev.idx},'cantiere')`;
        return `<div class="cal-event ${evCls}" title="${escAttr(ev.title)}" onclick="${onclick}">${esc(ev.title)}</div>`;
      }).join('') + `</div>`;
    }
  }
  html += `</div><div class="cal-legend"><div class="leg-item"><span class="leg-dot" style="background:var(--red-bg)"></span>Scadenze urgenti</div><div class="leg-item"><span class="leg-dot" style="background:var(--purple-bg)"></span>Cantieri</div></div>`;
  return html;
}

window.openQuickRenew=function(id){

  const c=state.companies.find(x=>x.id===id);if(!c)return;const months=c.renewMonths||12;
  showModal(`<div class="modal-bg" onclick="hideModal()"><div class="modal" onclick="event.stopPropagation()"><h3>Proroga rapida — ${esc(c.employeeName||c.name)}</h3>
    <div class="form-row"><div class="form-field"><label>Mesi da aggiungere</label><input id="qr-months" class="f-input" type="number" min="1" value="${months}" oninput="updateQuickRenewCausale(${id})"></div></div>

    <div class="modal-actions"><button class="m-btn" onclick="hideModal()">Annulla</button><button class="m-btn primary" id="qr-apply" onclick="doQuickRenew(${id})">Applica proroga</button></div></div></div>`);
  // initialize causale info after modal is inserted
  setTimeout(()=>updateQuickRenewCausale(id),20);

window.doQuickRenew=function(id){
  try{
    const m=parseInt((document.getElementById('qr-months')||{}).value)||0;const idx=state.companies.findIndex(c=>c.id===id);if(idx<0)return;const c=state.companies[idx];
    if(m<=0){showToast('Inserire mesi validi');return}
    if(!c.endDate||!c.startDate){showToast('Contratto senza data di scadenza o inizio');return}
    const d=new Date(c.endDate);d.setMonth(d.getMonth()+m);const newEndStr=d.toISOString().split('T')[0];
    const newDur=durationMonths(c.startDate,newEndStr);const newRenew=(c.renewCount||0)+1;
    const r=verificaCausale(newDur,newRenew,c.renewType==='Con causale');
    if(r.stato==='ERRORE'){showModal(`<div class="modal-bg" onclick="hideModal()"><div class="modal" onclick="event.stopPropagation()"><h3>Impossibile applicare proroga</h3><div style="margin-bottom:12px">${esc(r.msg)}</div><div class="modal-actions"><button class="m-btn" onclick="hideModal()">Chiudi</button></div></div></div>`);return}
    if(r.stato==='ATTENZIONE'){
      showModal(`<div class="modal-bg" onclick="hideModal()"><div class="modal" onclick="event.stopPropagation()"><h3>Attenzione nella proroga</h3><div style="margin-bottom:12px">${esc(r.msg)}</div><div class="modal-actions"><button class="m-btn" onclick="hideModal()">Annulla</button><button class="m-btn primary" onclick="doQuickRenewConfirm(${id},${m})">Procedi comunque</button></div></div></div>`);
      return;
    }
    // OK — apply
    state.companies[idx].endDate=newEndStr;state.companies[idx].renewCount=(state.companies[idx].renewCount||0)+1;saveData();hideModal();renderPage();renderSidebarCompanies();showToast('Proroga applicata');
  }catch(e){console.error('doQuickRenew',e);showToast('Errore durante la proroga')}
}

// Main page renderer
function renderPage(){
  const el=document.getElementById('page-content');
  if(!el) return;
  try{
    let html='';
    switch(state.page){
      case 'dashboard':
        // Dashboard metrics (quick counts)
        const expiredCnt = state.companies.filter(c=>daysLeft(c.endDate)<0).length;
        const urgentCnt = state.companies.filter(c=>{const d=daysLeft(c.endDate);return d>=0&&d<=30}).length;
        const renewableCnt = state.companies.filter(c=>c.renewable).length;
        const avgDur = state.companies.length?Math.round(state.companies.reduce((s,c)=>s+durationMonths(c.startDate,c.endDate),0)/state.companies.length):0;
        html+=`<div class="metrics-grid" style="margin-bottom:20px">
    <div class="metric-card"><div class="metric-label">Durata media</div><div class="metric-val">${avgDur}<span style="font-size:16px;font-weight:400"> mesi</span></div></div>
    <div class="metric-card"><div class="metric-label">Prorogabili</div><div class="metric-val c-blue">${renewableCnt}</div><div class="metric-delta">su ${state.companies.length} totali</div></div>
    <div class="metric-card m-amber"><div class="metric-label">In scadenza 30gg</div><div class="metric-val c-amber">${urgentCnt}</div></div>
    <div class="metric-card m-red"><div class="metric-label">Scaduti</div><div class="metric-val c-red">${expiredCnt}</div></div>
  </div>`;

        html+=`<div class="section-head"><div class="section-title">Contratti (${state.companies.length})</div><div><button class="tb-btn primary" onclick="openAddModal()">+ Nuovo contratto</button></div></div>`;
        // apply search filter
        const q=(state.searchQuery||'').toLowerCase();
        const list=state.companies.filter(c=>!q||(`${c.name} ${c.employeeName} ${c.contractType}`).toLowerCase().includes(q));
        list.sort((a,b)=>daysLeft(a.endDate)-daysLeft(b.endDate));
        html+=`<div id="contracts-list">${list.map(c=>renderContractCard(c)).join('')}</div>`;
        break;
      case 'company':
        html=renderCompanyContracts(state.activeCompany||'');
        break;
      case 'cantieri':
        html=renderCantieriPage();
        break;
      case 'analytics':
        html=renderAnalyticsPage();
        break;
      case 'settings':
        html=renderSettingsPage();
        break;
      case 'calendar':
        html=`<div class="section-head"><div class="section-title">Calendario</div></div>`;
        html+=renderCalendarPage();
        break;
      default:
        html='';
    }
    el.innerHTML=html;
    if(state.page==='analytics') setTimeout(initCharts,50);
  }catch(e){console.error('renderPage error',e);el.innerHTML='<div class="empty-state">Errore durante il rendering</div>'}
}

window.saveContract=function(editId){
  const name=(document.getElementById('f-name')||{}).value?.trim();
  const emp=(document.getElementById('f-emp')||{}).value?.trim();
  const type=(document.getElementById('f-type')||{}).value?.trim()||'Non specificato';
  const start=(document.getElementById('f-start')||{}).value;
  const end=(document.getElementById('f-end')||{}).value;
  const admin=(document.getElementById('f-admin')||{}).value?.trim();
  const company=(document.getElementById('f-company')||{}).value?.trim();
  const renewable=(document.getElementById('f-renew')||{}).value==='yes';
  const months=parseInt((document.getElementById('f-months')||{}).value)||12;
  const rtype=(document.getElementById('f-rtype')||{}).value||'Senza causale';
  const notice=parseInt((document.getElementById('f-notice')||{}).value)||30;
  const rcount=parseInt((document.getElementById('f-rcount')||{}).value)||0;
  const notes=(document.getElementById('f-notes')||{}).value?.trim();

  if(!name||!end){showToast('Inserire nome azienda e data scadenza');return}

  if(start&&end){
    const dm=durationMonths(start,end);
    const r=verificaCausale(dm,rcount,rtype==='Con causale');
    if(r.stato==='ERRORE'){showToast('⚠ '+r.msg);return}
    if(r.stato==='ATTENZIONE')showToast('⚠ Attenzione: '+r.msg);
  }

  if(editId!==null&&editId!==undefined){
    const idx=state.companies.findIndex(c=>c.id===editId);
    if(idx>=0){
      state.companies[idx]={...state.companies[idx],name,employeeName:emp,contractType:type,startDate:start,endDate:end,adminEmail:admin,companyEmail:company,renewable,renewMonths:months,renewType:rtype,renewNotice:notice,renewCount:rcount,notes};
    }
    showToast('Contratto aggiornato');
  }else{
    const newId=Math.max(0,...state.companies.map(c=>c.id||0))+1;
    state.companies.push({id:newId,name,employeeName:emp,contractType:type,startDate:start,endDate:end,adminEmail:admin,companyEmail:company,renewable,renewMonths:months,renewType:rtype,renewNotice:notice,renewCount:rcount,notes,cantieri:[]});
    showToast('Contratto aggiunto');
  }
  hideModal();saveData();renderPage();renderSidebarCompanies();
}

function isEmailJSConfigured(){const s=emailSettings.emailjs;return!!(s.serviceId&&s.templateId&&s.publicKey)}

function addLog(contractName,recipients,status,method,detail){
  emailLog.unshift({date:new Date().toISOString(),contractName,recipients,status,method,detail:detail||''});
  if(emailLog.length>100)emailLog.length=100;
  save(SK.log,emailLog);
}

async function sendEmailReal(to,subject,body,name){
  if(emailSettings.sendMethod==='emailjs'&&isEmailJSConfigured()){
    try{
      const s=emailSettings.emailjs;emailjs.init(s.publicKey);
      await emailjs.send(s.serviceId,s.templateId,{to_email:to,subject,message:body,contract_name:name});
      addLog(name,to,'success','emailjs','Inviata via EmailJS');return{ok:true,method:'emailjs'};
    }catch(err){const msg=(err&&err.text)||String(err);addLog(name,to,'error','emailjs',msg);return{ok:false,method:'emailjs',error:msg}}
  }
  const a=document.createElement('a');
  a.href=`mailto:${to.replace(/;/g,',').replace(/\s/g,'')}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  a.click();addLog(name,to,'success','mailto','Aperto client email');return{ok:true,method:'mailto'};
}

function startAutoSend(){stopAutoSend();if(!emailSettings.autoSend.enabled)return;runAutoCheck();autoSendInterval=setInterval(runAutoCheck,(emailSettings.autoSend.checkIntervalMinutes||60)*60000)}
function stopAutoSend(){if(autoSendInterval){clearInterval(autoSendInterval);autoSendInterval=null}}
async function runAutoCheck(){
  if(!emailSettings.autoSend.enabled)return;
  for(const c of state.companies){
    const d=daysLeft(c.endDate);if(d<0)continue;
    for(const t of(emailSettings.autoSend.daysBeforeExpiry||[])){
      if(d<=t){
        const key=`${c.id}_${t}_${new Date().toISOString().split('T')[0]}`;
        if(sentTracker[key])continue;
        const r=await sendEmailReal(`${c.adminEmail}; ${c.companyEmail}`,`[AUTO] ${c.name} scade tra ${d}gg`,generateEmailBody(c,d),c.name);
        if(r.ok){sentTracker[key]=new Date().toISOString();save(SK.sent,sentTracker)}
        break;
      }
    }
  }
}

window.triggerImportExcel=()=>{
  const inp=document.createElement('input');inp.type='file';inp.accept='.xlsx,.xls,.csv';
  inp.onchange=e=>{

function importRows(rows){
  if(!rows.length){showToast('File vuoto');return}
  const map={nome:'name',azienda:'name','nome azienda':'name',dipendente:'employeeName','tipo contratto':'contractType','tipo':'contractType','data inizio':'startDate',inizio:'startDate','data scadenza':'endDate',scadenza:'endDate',prorogabile:'renewable','durata proroga':'renewMonths','durata proroga (mesi)':'renewMonths','tipo proroga':'renewType',preavviso:'renewNotice','preavviso (gg)':'renewNotice','proroghe effettuate':'renewCount','email admin':'adminEmail','email azienda':'companyEmail',note:'notes'};
  const headers=Object.keys(rows[0]);const mapping={};
  headers.forEach(h=>{const k=map[h.toLowerCase().trim()];if(k)mapping[h]=k});
  if(!Object.keys(mapping).length){showToast('Intestazioni non riconosciute');return}
  let maxId=state.companies.reduce((m,c)=>Math.max(m,c.id||0),0);let count=0;
  rows.forEach(row=>{
    const v={};Object.keys(mapping).forEach(h=>{v[mapping[h]]=row[h]});
    v.startDate=parseDate(v.startDate);v.endDate=parseDate(v.endDate);
    if(!v.name||!v.endDate)return;
    maxId++;state.companies.push({id:maxId,name:String(v.name).trim(),employeeName:String(v.employeeName||'').trim(),contractType:String(v.contractType||'Non specificato').trim(),startDate:v.startDate||'',endDate:v.endDate,renewable:parseBool(v.renewable),renewMonths:parseInt(v.renewMonths)||12,renewType:String(v.renewType||'Senza causale').trim(),renewNotice:parseInt(v.renewNotice)||30,renewCount:parseInt(v.renewCount)||0,adminEmail:String(v.adminEmail||'').trim(),companyEmail:String(v.companyEmail||'').trim(),notes:String(v.notes||'').trim(),cantieri:[]});count++;
  });
  if(count){saveData();renderPage();renderSidebarCompanies();showToast('Importati '+count+' contratti')}
  else showToast('Nessun contratto valido trovato');
}
function parseDate(v){if(!v)return'';if(v instanceof Date){return`${v.getFullYear()}-${String(v.getMonth()+1).padStart(2,'0')}-${String(v.getDate()).padStart(2,'0')}`}const s=String(v).trim();if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;const m=s.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})$/);if(m)return`${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;const d=new Date(s);return isNaN(d.getTime())?'':d.toISOString().split('T')[0]}
function parseBool(v){if(typeof v==='boolean')return v;return['sì','si','yes','true','1','vero','x'].includes(String(v||'').toLowerCase().trim())}

// CLOUD SYNC
// ═══════════════════════════════════════
function encRoom(n){return String(n).replace(/[.#$\[\]\/]/g,'_').substring(0,128)}
function fbArrayFromVal(v){if(!v)return null;if(Array.isArray(v))return v;if(typeof v==='object'){const k=Object.keys(v);if(!k.length)return null;return k.map(i=>v[i]).filter(Boolean)}return null}

function initSync(){
  if(!syncConfig.enabled||!syncConfig.apiKey||!syncConfig.databaseURL||!syncConfig.roomName){disconnectSync();return}
  try{
    const ex=firebase.apps.find(a=>a.name==='syncApp');
    if(ex)ex.delete().then(connectSync).catch(connectSync);
    else connectSync();
  }catch(e){syncState.connected=false;updateSyncUI()}
}
function connectSync(){
  try{
    const app=firebase.initializeApp({apiKey:syncConfig.apiKey,databaseURL:syncConfig.databaseURL},'syncApp');
    syncState.db=app.database();
    syncState.db.ref('.info/connected').on('value',s=>{syncState.connected=s.val()===true;updateSyncUI()});
    const ref=syncState.db.ref('rooms/'+encRoom(syncConfig.roomName)+'/data');
    if(syncState.listener)syncState.listener.off();
    syncState.listener=ref;
    ref.on('value',s=>{
      if(syncState.skipNext){syncState.skipNext=false;return}
      const rd=fbArrayFromVal(s.val());
      if(rd&&JSON.stringify(rd)!==JSON.stringify(state.companies)){
        state.companies=rd;save(SK.data,rd);syncState.lastSync=new Date().toISOString();renderPage();renderSidebarCompanies();
      }updateSyncUI();
    });
  }catch(e){syncState.connected=false;updateSyncUI()}
}
function syncToCloud(){
  if(!syncState.db||!syncConfig.enabled||!syncConfig.roomName)return;
  syncState.skipNext=true;
  syncState.db.ref('rooms/'+encRoom(syncConfig.roomName)+'/data').set(JSON.parse(JSON.stringify(state.companies))).then(()=>{syncState.lastSync=new Date().toISOString();updateSyncUI()}).catch(()=>{syncState.skipNext=false});
}
window.pullFromCloud=()=>{
  if(!syncState.db||!syncConfig.enabled)return;
  syncState.db.ref('rooms/'+encRoom(syncConfig.roomName)+'/data').once('value').then(s=>{
    const d=fbArrayFromVal(s.val());
    if(d){state.companies=d;save(SK.data,d);syncState.lastSync=new Date().toISOString();renderPage();renderSidebarCompanies();showToast('Dati scaricati dal cloud')}
    updateSyncUI();
  }).catch(e=>console.error('Pull error',e));
}
window.forcePushToCloud=()=>{
  if(!syncState.connected||!syncState.db)return;
  syncState.skipNext=true;
  syncState.db.ref('rooms/'+encRoom(syncConfig.roomName)+'/data').set(JSON.parse(JSON.stringify(state.companies))).then(()=>{syncState.lastSync=new Date().toISOString();updateSyncUI();showToast('Dati caricati sul cloud')}).catch(e=>{syncState.skipNext=false});
}
function disconnectSync(){if(syncState.listener){syncState.listener.off();syncState.listener=null}try{const a=firebase.apps.find(x=>x.name==='syncApp');if(a)a.delete()}catch(e){}syncState.connected=false;syncState.db=null;updateSyncUI()}
function updateSyncUI(){
  const el=document.getElementById('sync-status');
  if(!el)return;
  if(!syncConfig.enabled)el.innerHTML='<span class="status-pill off"><span class="status-dot off"></span>Disattivata</span>';
  else if(syncState.connected)el.innerHTML=`<span class="status-pill ok"><span class="status-dot ok"></span>Connesso${syncState.lastSync?' — '+new Date(syncState.lastSync).toLocaleTimeString('it-IT'):''}</span>`;
  else el.innerHTML='<span class="status-pill warn"><span class="status-dot warn"></span>Connessione in corso…</span>';
}
window.toggleCloudSync=checked=>{syncConfig.enabled=checked;save(SK.sync,syncConfig);if(checked)initSync();else disconnectSync();renderPage()}
window.saveSyncField=(f,v)=>{syncConfig[f]=v;save(SK.sync,syncConfig)}
window.applySyncConfig=()=>{save(SK.sync,syncConfig);initSync();renderPage()}

// ═══════════════════════════════════════
// SAVE DATA
// ═══════════════════════════════════════
function saveData(){save(SK.data,state.companies);syncToCloud()}

// ═══════════════════════════════════════
// TOAST
// ═══════════════════════════════════════
function showToast(msg){const e=document.querySelector('.toast');if(e)e.remove();const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2600)}

// ══ AUTH ══
function loadAuthCfg(){return load(SK.auth,{apiKey:'',authDomain:''})}
function saveAuthCfg(c){save(SK.auth,c)}
function getAuthApp(){
  const c=loadAuthCfg();if(!c.apiKey||!c.authDomain)return null;
  try{
    if(authFirebaseApp)return authFirebaseApp;
    authFirebaseApp=firebase.initializeApp({apiKey:c.apiKey,authDomain:c.authDomain},'authApp');
    return authFirebaseApp;
  }catch(e){const ex=firebase.apps.find(a=>a.name==='authApp');if(ex){authFirebaseApp=ex;return ex}return null}
}

function renderLogin(){
  const ls=document.getElementById('login-screen');
  const cfg=loadAuthCfg();const hasConfig=!!cfg.apiKey;
  ls.innerHTML=`<div class="login-screen">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-mark"><svg viewBox="0 0 24 24" width="18" height="18" stroke="white" fill="none" stroke-width="2" stroke-linecap="round"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg></div>
        <span class="login-logo-text">Gestione Contratti</span>
      </div>
      <div class="login-subtitle">Accedi al tuo account per continuare</div>
      <div class="login-err" id="login-err"></div>
      ${!hasConfig?`
      <div style="margin-bottom:16px;padding:12px;background:var(--surface2);border-radius:8px;font-size:12px;color:var(--text2);line-height:1.6">
        <strong>Prima configurazione:</strong> vai su <a href="https://console.firebase.google.com" target="_blank">console.firebase.google.com</a>, crea un progetto, abilita Authentication (Email/Password) e copia API Key e Auth Domain.
      </div>
      <div class="form-field" style="margin-bottom:12px"><label class="field-label">Firebase API Key</label><input class="f-input" id="auth-key" type="text" value="${escAttr(cfg.apiKey)}" placeholder="AIzaSy…" style="width:100%"></div>
      <div class="form-field" style="margin-bottom:16px"><label class="field-label">Auth Domain</label><input class="f-input" id="auth-domain" type="text" value="${escAttr(cfg.authDomain||'')}" placeholder="progetto.firebaseapp.com" style="width:100%"></div>
      <button class="m-btn primary" onclick="saveAuthAndReload()" style="width:100%">Salva configurazione</button>`
      :`<div id="login-form">
        <div class="form-field" style="margin-bottom:12px"><label class="field-label">Email</label><input class="f-input" id="login-email" type="email" placeholder="nome@email.com" autocomplete="email" style="width:100%"></div>
        <div class="form-field" style="margin-bottom:16px"><label class="field-label">Password</label><div class="pw-wrap"><input class="f-input" id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password"><button class="pw-eye" onclick="togglePw('login-pass',this)" type="button"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>
        <button class="m-btn primary" id="login-btn" onclick="doLogin()" style="width:100%">Accedi</button>
        <div class="login-toggle-link">Non hai un account? <a onclick="showReg()">Registrati</a></div>
      </div>
      <div id="reg-form" style="display:none">
        <div class="form-field" style="margin-bottom:12px"><label class="field-label">Email</label><input class="f-input" id="reg-email" type="email" placeholder="nome@email.com" style="width:100%"></div>
        <div class="form-field" style="margin-bottom:12px"><label class="field-label">Password (min. 6 caratteri)</label><div class="pw-wrap"><input class="f-input" id="reg-pass" type="password" placeholder="••••••••" minlength="6"><button class="pw-eye" onclick="togglePw('reg-pass',this)" type="button"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></div></div>
        <div class="form-field" style="margin-bottom:16px"><label class="field-label">Conferma password</label><input class="f-input" id="reg-pass2" type="password" placeholder="••••••••" style="width:100%"></div>
        <button class="m-btn primary" id="reg-btn" onclick="doRegister()" style="width:100%">Crea account</button>
        <div class="login-toggle-link">Hai già un account? <a onclick="showLogin()">Accedi</a></div>
      </div>
      <div style="margin-top:12px;text-align:center"><a style="font-size:11px;color:var(--text3);cursor:pointer" onclick="resetAuth()">Cambia configurazione Firebase</a></div>`}
      <div style="margin-top:16px;text-align:center">
        <button class="icon-btn" onclick="toggleTheme()" title="Cambia tema" style="display:inline-flex"><svg id="theme-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg></button>
      </div>
    </div>
  </div>`;

  setTimeout(()=>{
    const ei=document.getElementById('login-email'),pi=document.getElementById('login-pass');
    if(ei)ei.addEventListener('keydown',e=>{if(e.key==='Enter'&&pi)pi.focus()});
    if(pi)pi.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
    applyTheme(state.theme);
  },50);
}

function showLoginErr(m){const e=document.getElementById('login-err');if(e){e.textContent=m;e.style.display=m?'block':'none'}}
window.showReg=()=>{document.getElementById('login-form').style.display='none';document.getElementById('reg-form').style.display='block';showLoginErr('')}
window.showLogin=()=>{document.getElementById('reg-form').style.display='none';document.getElementById('login-form').style.display='block';showLoginErr('')}
window.togglePw=(id,btn)=>{const i=document.getElementById(id);if(!i)return;i.type=i.type==='password'?'text':'password';btn.innerHTML=i.type==='password'?'<svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>':'<svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'}

function authErrMsg(code){const m={'auth/invalid-email':'Email non valida.','auth/user-not-found':'Nessun account con questa email.','auth/wrong-password':'Password errata.','auth/invalid-credential':'Credenziali non valide.','auth/email-already-in-use':'Email già registrata.','auth/weak-password':'Password troppo corta (min. 6 caratteri).','auth/too-many-requests':'Troppi tentativi. Riprova più tardi.','auth/network-request-failed':'Errore di rete.'};return m[code]||'Errore: '+code}

function setBtnLoading(id,loading,text){const b=document.getElementById(id);if(!b)return;b.disabled=loading;b.innerHTML=loading?`<span class="spin"></span> Caricamento…`:text}

window.doLogin=()=>{
  const email=(document.getElementById('login-email')||{}).value?.trim();
  const pass=(document.getElementById('login-pass')||{}).value;
  if(!email||!pass){showLoginErr('Inserisci email e password');return}
  const app=getAuthApp();if(!app){showLoginErr('Configurazione Firebase mancante');return}
  showLoginErr('');setBtnLoading('login-btn',true,'Accedi');
  app.auth().signInWithEmailAndPassword(email,pass).then(c=>{authUser=c.user;enterApp()}).catch(e=>{showLoginErr(authErrMsg(e.code));setBtnLoading('login-btn',false,'Accedi')});
}
window.doRegister=()=>{
  const email=(document.getElementById('reg-email')||{}).value?.trim();
  const pass=(document.getElementById('reg-pass')||{}).value;
  const pass2=(document.getElementById('reg-pass2')||{}).value;
  if(!email||!pass){showLoginErr('Inserisci email e password');return}
  if(pass.length<6){showLoginErr('Password min. 6 caratteri');return}
  if(pass!==pass2){showLoginErr('Le password non corrispondono');return}
  const app=getAuthApp();if(!app){showLoginErr('Config Firebase mancante');return}
  showLoginErr('');setBtnLoading('reg-btn',true,'Crea account');
  app.auth().createUserWithEmailAndPassword(email,pass).then(c=>{authUser=c.user;enterApp()}).catch(e=>{showLoginErr(authErrMsg(e.code));setBtnLoading('reg-btn',false,'Crea account')});
}
window.saveAuthAndReload=()=>{
  const k=(document.getElementById('auth-key')||{}).value?.trim();
  const d=(document.getElementById('auth-domain')||{}).value?.trim();
  if(!k){showLoginErr('Inserisci API Key');return}
  if(!d){showLoginErr("Inserisci Auth Domain");return}
  saveAuthCfg({apiKey:k,authDomain:d});location.reload();
}
window.resetAuth=()=>{saveAuthCfg({apiKey:'',authDomain:''});location.reload()}
window.doLogout=()=>{
  const app=getAuthApp();
  const logout=()=>{authUser=null;document.getElementById('app-shell').style.display='none';document.getElementById('login-screen').style.display='';renderLogin()};
  if(app)app.auth().signOut().then(logout).catch(logout);else logout();
}

function enterApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-shell').style.display='flex';
  document.getElementById('mobile-menu-btn').style.display=window.innerWidth<640?'flex':'none';
  updateNav();renderSidebarCompanies();renderPage();
  if(emailSettings.autoSend.enabled)startAutoSend();
  if(syncConfig.enabled)initSync();

  // Close notif center on outside click
  document.addEventListener('click',e=>{
    const nc=document.getElementById('notif-center');
    const nb=document.getElementById('notif-btn');
    if(nc&&nb&&!nc.contains(e.target)&&!nb.contains(e.target)){state.showNotifCenter=false;nc.style.display='none'}
  });
  // Keyboard shortcuts
  document.addEventListener('keydown',e=>{if(e.key==='Escape'){hideModal();state.showNotifCenter=false;const nc=document.getElementById('notif-center');if(nc)nc.style.display='none'}});
  // Responsive
  window.addEventListener('resize',()=>{const mb=document.getElementById('mobile-menu-btn');if(mb)mb.style.display=window.innerWidth<640?'flex':'none'});
}

// ═══════════════════════════════════════
// BOOT
// ═══════════════════════════════════════
(function boot(){
  const cfg=loadAuthCfg();
  if(cfg.apiKey){
    const app=getAuthApp();
    if(app){app.auth().onAuthStateChanged(u=>{if(u){authUser=u;enterApp()}else renderLogin()});return}
  }
  renderLogin();
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contratti</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.4/dist/jspdf.plugin.autotable.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --ff: 'DM Sans', sans-serif;
  --fm: 'DM Mono', monospace;
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #f0efe9;
  --surface3: #e8e7e0;
  --text: #1c1c1a;
  --text2: #6b6a65;
  --text3: #a09f9a;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.13);
  --accent: #2a5bd7;
  --accent-bg: #eef2fd;
  --red: #d63c3c;
  --red-bg: #fdf0f0;
  --red-border: #f5c5c5;
  --amber: #c47e0c;
  --amber-bg: #fdf6e7;
  --amber-border: #f0d798;
  --green: #2d8a4e;
  --green-bg: #edf7f1;
  --green-border: #a8ddb9;
  --purple: #6d3fcf;
  --purple-bg: #f3eefb;
  --sidebar-w: 220px;
  --header-h: 56px;
  --radius: 10px;
  --radius-lg: 14px;
  --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.05);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
  --t: 0.18s ease;
}
[data-theme="dark"] {
  --bg: #131312;
  --surface: #1e1e1c;
  --surface2: #252523;
  --surface3: #2e2e2b;
  --text: #ebebea;
  --text2: #8a8984;
  --text3: #55554f;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --accent: #5580e8;
  --accent-bg: #1a2240;
  --red: #e86060;
  --red-bg: #2a1515;
  --red-border: #5a2020;
  --amber: #e09a30;
  --amber-bg: #2a1f08;
  --amber-border: #5a3f10;
  --green: #4dac6e;
  --green-bg: #0d2218;
  --green-border: #1e5232;
  --purple: #9d74e8;
  --purple-bg: #1f1535;
  --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.2);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.4), 0 2px 8px rgba(0,0,0,0.3);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{
  font-family:var(--ff);
  background:var(--bg);
  color:var(--text);
  height:100%;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  font-size:14px;
}
button{font-family:var(--ff);cursor:pointer}
input,select,textarea{font-family:var(--ff)}
a{color:var(--accent)}
code{font-family:var(--fm);font-size:.85em;background:var(--surface3);padding:1px 5px;border-radius:4px}

/* ═══ LAYOUT ═══ */
.app-shell{display:flex;height:100vh;overflow:hidden}
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  overflow-y:auto;overflow-x:hidden;
  transition:width var(--t), transform var(--t);
  z-index:50;
}
.sidebar.collapsed{width:56px}
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{
  height:var(--header-h);flex-shrink:0;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;
  padding:0 20px;
  position:sticky;top:0;z-index:40;
}
.page-content{flex:1;overflow-y:auto;padding:24px 28px}

/* ═══ SIDEBAR ═══ */
.sidebar-logo{
  display:flex;align-items:center;gap:10px;
  padding:16px 14px 12px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.logo-mark{
  width:30px;height:30px;border-radius:8px;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.logo-mark svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round}
.logo-text{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden}
.sidebar-nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:1px}
.sidebar-section-label{
  font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;
  color:var(--text3);padding:10px 8px 4px;white-space:nowrap;overflow:hidden;
}
.sidebar.collapsed .sidebar-section-label{opacity:0;height:0;padding:0;overflow:hidden}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 8px;border-radius:8px;
  color:var(--text2);font-size:13px;font-weight:400;
  border:none;background:none;width:100%;text-align:left;
  transition:background var(--t),color var(--t);
  white-space:nowrap;overflow:hidden;cursor:pointer;
}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent-bg);color:var(--accent);font-weight:500}
.nav-item svg{width:16px;height:16px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
.nav-item .nav-badge{
  margin-left:auto;font-size:10px;font-weight:600;
  background:var(--red);color:#fff;
  padding:1px 6px;border-radius:99px;flex-shrink:0;
}
.sidebar-companies{padding:0 8px 8px;flex:1}
.company-nav-item{
  display:flex;align-items:center;gap:8px;
  padding:6px 8px;border-radius:7px;
  color:var(--text2);font-size:12px;
  border:none;background:none;width:100%;text-align:left;
  transition:background var(--t),color var(--t);cursor:pointer;
  white-space:nowrap;overflow:hidden;
}
.company-nav-item:hover{background:var(--surface2);color:var(--text)}
.company-nav-item.active{background:var(--accent-bg);color:var(--accent);font-weight:500}
.company-initial{
  width:22px;height:22px;border-radius:6px;
  background:var(--surface3);color:var(--text2);
  font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.company-nav-item.active .company-initial{background:var(--accent-bg);color:var(--accent)}
.sidebar-footer{padding:10px 8px;border-top:1px solid var(--border)}
.toggle-sidebar-btn{
  display:flex;align-items:center;gap:10px;
  padding:7px 8px;border-radius:8px;color:var(--text3);
  font-size:12px;border:none;background:none;width:100%;cursor:pointer;
  transition:background var(--t),color var(--t);
}
.toggle-sidebar-btn:hover{background:var(--surface2);color:var(--text2)}
.toggle-sidebar-btn svg{width:16px;height:16px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round}

/* ═══ TOPBAR ═══ */
.topbar-title{font-size:15px;font-weight:600;color:var(--text);flex:1}
.topbar-search{
  position:relative;max-width:280px;width:100%;
}
.topbar-search input{
  width:100%;padding:7px 12px 7px 32px;
  font-size:13px;border-radius:8px;
  border:1px solid var(--border2);
  background:var(--surface2);color:var(--text);
  transition:border-color var(--t),box-shadow var(--t),background var(--t);
}
.topbar-search input:focus{
  outline:none;border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(42,91,215,0.12);
  background:var(--surface);
}
.topbar-search input::placeholder{color:var(--text3)}
.topbar-search .si{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  color:var(--text3);pointer-events:none;
}
.topbar-search .si svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.topbar-actions{display:flex;align-items:center;gap:8px}
.tb-btn{
  display:flex;align-items:center;gap:6px;
  padding:7px 13px;font-size:13px;font-weight:500;
  border:1px solid var(--border2);border-radius:8px;
  background:var(--surface);color:var(--text2);
  transition:all var(--t);cursor:pointer;white-space:nowrap;
}
.tb-btn:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.tb-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.tb-btn.primary:hover{opacity:.9}
.tb-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0}
.icon-btn{
  width:34px;height:34px;border-radius:8px;
  border:1px solid var(--border2);background:var(--surface);
  color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all var(--t);position:relative;
}
.icon-btn:hover{background:var(--surface2);color:var(--text)}
.icon-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round}
.notif-badge{
  position:absolute;top:-3px;right:-3px;
  width:16px;height:16px;border-radius:50%;
  background:var(--red);color:#fff;font-size:9px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--surface);
}

/* ═══ SECTIONS ═══ */
.section-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;
}
.section-title{font-size:16px;font-weight:600;color:var(--text)}
.section-sub{font-size:13px;color:var(--text2);margin-top:1px}
.label-tag{
  font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
  color:var(--text3);margin-bottom:10px;display:block;
}

/* ═══ METRICS GRID ═══ */
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.metric-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:16px 18px;
  position:relative;overflow:hidden;
  transition:transform var(--t),box-shadow var(--t);
}
.metric-card:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.metric-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--mc-color,transparent);border-radius:var(--radius-lg) var(--radius-lg) 0 0;
}
.metric-card.m-red{--mc-color:var(--red)}
.metric-card.m-amber{--mc-color:var(--amber)}
.metric-card.m-green{--mc-color:var(--green)}
.metric-card.m-blue{--mc-color:var(--accent)}
.metric-label{font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:400}
.metric-val{font-size:30px;font-weight:300;color:var(--text);line-height:1}
.metric-val.c-red{color:var(--red)}
.metric-val.c-amber{color:var(--amber)}
.metric-val.c-green{color:var(--green)}
.metric-val.c-blue{color:var(--accent)}
.metric-delta{font-size:11px;color:var(--text3);margin-top:6px}

/* ═══ ALERT BANNER ═══ */
.alert-strip{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-radius:var(--radius);
  margin-bottom:8px;font-size:13px;border:1px solid;
  animation:slideDown .2s ease;
}
.alert-strip.danger{background:var(--red-bg);border-color:var(--red-border);color:var(--red)}
.alert-strip.warn{background:var(--amber-bg);border-color:var(--amber-border);color:var(--amber)}
.alert-strip svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}
.alert-text{flex:1}

/* ═══ URGENCY GROUPS ═══ */
.urgency-group{margin-bottom:24px}
.group-header{
  display:flex;align-items:center;gap:8px;
  margin-bottom:10px;padding-bottom:8px;
  border-bottom:1px solid var(--border);
}
.group-title{font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text2)}
.group-count{
  font-size:11px;font-weight:600;padding:2px 8px;
  border-radius:99px;background:var(--surface3);color:var(--text2);
}
.group-count.danger{background:var(--red-bg);color:var(--red)}
.group-count.warn{background:var(--amber-bg);color:var(--amber)}
.group-count.ok{background:var(--green-bg);color:var(--green)}

/* ═══ CONTRACT CARD ═══ */
.contract-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);margin-bottom:10px;
  overflow:hidden;transition:box-shadow var(--t),transform var(--t);
  position:relative;
}
.contract-card:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.contract-card.urgent{border-left:3px solid var(--red)}
.contract-card.warning{border-left:3px solid var(--amber)}
.contract-card.ok{border-left:3px solid var(--green)}
.contract-card.expired{border-left:3px solid var(--text3)}
.card-main{padding:14px 16px}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
.card-ident{}
.card-company-name{font-size:15px;font-weight:600;color:var(--text);line-height:1.2}
.card-employee{font-size:13px;color:var(--text2);margin-top:2px}
.card-type{font-size:12px;color:var(--text3);margin-top:1px}
.card-badges{display:flex;gap:5px;align-items:center;flex-wrap:wrap;flex-shrink:0}
.badge{
  font-size:11px;font-weight:500;padding:3px 9px;
  border-radius:99px;white-space:nowrap;
}
.badge-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.badge-amber{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.badge-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.badge-blue{background:var(--accent-bg);color:var(--accent);border:1px solid rgba(42,91,215,.2)}
.badge-gray{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.badge-purple{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(109,63,207,.2)}

/* progress */
.prog-bar{height:3px;background:var(--surface3);border-radius:99px;margin-bottom:12px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .5s ease}
.prog-fill.red{background:var(--red)}
.prog-fill.amber{background:var(--amber)}
.prog-fill.green{background:var(--green)}
.prog-fill.gray{background:var(--text3)}

/* fields row */
.card-fields{
  display:grid;grid-template-columns:repeat(5,1fr);
  gap:10px 14px;margin-bottom:12px;
}
.field-label{font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text3);margin-bottom:2px}
.field-val{font-size:13px;color:var(--text);font-weight:400}
.field-val.c-red{color:var(--red);font-weight:600}
.field-val.c-amber{color:var(--amber);font-weight:600}
.field-val.c-green{color:var(--green)}

/* causale inline */
.causale-inline{
  padding:8px 11px;border-radius:8px;
  font-size:12px;line-height:1.5;margin-bottom:10px;
  display:flex;align-items:flex-start;gap:8px;border:1px solid;
}
.causale-inline.ok{background:var(--green-bg);border-color:var(--green-border);color:var(--green);display:none}
.causale-inline.warn{background:var(--amber-bg);border-color:var(--amber-border);color:var(--amber)}
.causale-inline.err{background:var(--red-bg);border-color:var(--red-border);color:var(--red)}
.causale-inline svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0;margin-top:1px}
.causale-title{font-weight:600}

/* notes */
.card-notes{
  font-size:12px;color:var(--text2);
  background:var(--surface2);border-radius:7px;
  padding:8px 11px;margin-bottom:10px;
  line-height:1.55;
}
.card-notes .notes-label{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);display:block;margin-bottom:3px}

/* cantieri */
.cantieri-inline{margin-bottom:10px}
.cantieri-label{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.cantiere-row{
  display:flex;align-items:center;gap:10px;
  font-size:12px;padding:5px 0;
  border-bottom:1px solid var(--border);
}
.cantiere-row:last-child{border-bottom:none}
.cantiere-nome{flex:1;color:var(--text);font-weight:500}
.cantiere-scad{color:var(--red);font-weight:600;font-size:11px}
.cantiere-scad.ok{color:var(--green)}
.cantiere-note{color:var(--text3);font-style:italic}

/* card actions */
.card-actions{
  display:flex;gap:6px;flex-wrap:wrap;
  padding:10px 16px;background:var(--surface2);
  border-top:1px solid var(--border);
}
.act-btn{
  display:flex;align-items:center;gap:5px;
  font-size:12px;font-weight:500;padding:5px 12px;
  border-radius:7px;border:1px solid var(--border2);
  background:var(--surface);color:var(--text2);
  transition:all var(--t);cursor:pointer;white-space:nowrap;
}
.act-btn:hover{background:var(--surface3);color:var(--text)}
.act-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.act-btn.primary:hover{opacity:.88}
.act-btn.danger{color:var(--red);border-color:var(--red-border)}
.act-btn.danger:hover{background:var(--red-bg)}
.act-btn.quick-renew{color:var(--green);border-color:var(--green-border)}
.act-btn.quick-renew:hover{background:var(--green-bg)}
.act-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}

/* ═══ CALENDAR ═══ */
.calendar-grid{
  display:grid;grid-template-columns:repeat(7,1fr);
  gap:2px;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius-lg);
  overflow:hidden;
}
.cal-header-cell{
  padding:8px 4px;text-align:center;
  font-size:11px;font-weight:600;letter-spacing:.04em;
  color:var(--text2);background:var(--surface2);
}
.cal-day{
  min-height:80px;padding:5px;
  background:var(--surface);
  border-top:1px solid var(--border);
  transition:background var(--t);cursor:pointer;
}
.cal-day:hover{background:var(--surface2)}
.cal-day.today{background:var(--accent-bg)}
.cal-day.other-month .cal-day-num{color:var(--text3)}
.cal-day-num{font-size:12px;font-weight:500;color:var(--text);margin-bottom:3px}
.cal-event{
  font-size:10px;font-weight:500;padding:2px 5px;
  border-radius:4px;margin-bottom:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  cursor:pointer;
}
.cal-event.urgent{background:var(--red-bg);color:var(--red)}
.cal-event.warning{background:var(--amber-bg);color:var(--amber)}
.cal-event.ok{background:var(--green-bg);color:var(--green)}
.cal-event.cantiere{background:var(--purple-bg);color:var(--purple)}
.cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.cal-month-label{font-size:15px;font-weight:600;color:var(--text);flex:1}
.cal-legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.leg-dot{width:10px;height:10px;border-radius:3px}

/* ═══ ANALYTICS ═══ */
.chart-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:18px 20px;
  margin-bottom:16px;
}
.chart-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:14px}

/* ═══ COMPANY VIEW ═══ */
.company-hero{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:18px 22px;
  margin-bottom:16px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  flex-wrap:wrap;
}
.company-avatar{
  width:42px;height:42px;border-radius:10px;
  background:var(--accent-bg);color:var(--accent);
  font-size:16px;font-weight:700;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.company-info{flex:1}
.company-name{font-size:18px;font-weight:600;color:var(--text)}
.company-meta{font-size:12px;color:var(--text2);margin-top:3px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.company-meta svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}

/* ═══ CANTIERI PAGE ═══ */
.cantiere-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:14px 18px;
  margin-bottom:10px;
  display:flex;align-items:center;gap:16px;
}
.cantiere-urgency-bar{width:4px;flex-shrink:0;height:48px;border-radius:99px;background:var(--green)}
.cantiere-urgency-bar.urgent{background:var(--red)}
.cantiere-urgency-bar.warning{background:var(--amber)}
.cantiere-info{flex:1;min-width:0}
.cantiere-name{font-size:14px;font-weight:600;color:var(--text)}
.cantiere-company{font-size:12px;color:var(--text2)}
.cantiere-right{text-align:right;flex-shrink:0}
.cantiere-days{font-size:20px;font-weight:300;color:var(--text)}
.cantiere-days.urgent{color:var(--red)}
.cantiere-days.warning{color:var(--amber)}
.cantiere-days.ok{color:var(--green)}
.cantiere-days-label{font-size:11px;color:var(--text3)}

/* ═══ SETTINGS ═══ */
.settings-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:20px 22px;margin-bottom:14px;
}
.settings-card h4{font-size:14px;font-weight:600;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.settings-card h4 svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.settings-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.settings-row.triple{grid-template-columns:1fr 1fr 1fr}
.settings-row.single{grid-template-columns:1fr}
.field-group{display:flex;flex-direction:column;gap:5px}
.field-group label{font-size:12px;font-weight:600;color:var(--text2)}
.field-hint{font-size:11px;color:var(--text3);line-height:1.4;margin-top:2px}
.f-input{
  font-size:13px;border-radius:8px;
  border:1px solid var(--border2);
  padding:8px 11px;background:var(--surface);
  color:var(--text);transition:border-color var(--t),box-shadow var(--t);
}
.f-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(42,91,215,.12)}
.f-input::placeholder{color:var(--text3)}
select.f-input{cursor:pointer}
textarea.f-input{resize:vertical;min-height:70px;line-height:1.5}
.toggle-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.toggle-switch{position:relative;width:42px;height:23px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-track{
  position:absolute;inset:0;border-radius:99px;
  background:var(--border2);transition:background .2s;cursor:pointer;
}
.toggle-track::before{
  content:'';position:absolute;height:17px;width:17px;
  left:3px;bottom:3px;background:#fff;border-radius:50%;
  transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);
}
.toggle-switch input:checked + .toggle-track{background:var(--accent)}
.toggle-switch input:checked + .toggle-track::before{transform:translateX(19px)}
.toggle-label{font-size:13px;color:var(--text)}
.status-pill{
  display:inline-flex;align-items:center;gap:5px;
  font-size:12px;font-weight:500;padding:4px 11px;
  border-radius:99px;margin-top:6px;
}
.status-pill.ok{background:var(--green-bg);color:var(--green)}
.status-pill.warn{background:var(--amber-bg);color:var(--amber)}
.status-pill.off{background:var(--surface2);color:var(--text3)}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.status-dot.ok{background:var(--green)}
.status-dot.warn{background:var(--amber)}
.status-dot.off{background:var(--text3)}

/* auto-send day chips */
.day-chips{display:flex;gap:6px;flex-wrap:wrap}
.day-chip{
  font-size:12px;padding:5px 11px;border-radius:99px;
  border:1px solid var(--border2);background:var(--surface2);
  color:var(--text2);cursor:pointer;transition:all var(--t);
}
.day-chip:hover{border-color:var(--accent);color:var(--accent)}
.day-chip.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);font-weight:600}

/* send method radio */
.send-method{display:flex;flex-direction:column;gap:8px}
.method-option{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 12px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface2);cursor:pointer;transition:all var(--t);
}
.method-option:hover{border-color:var(--border2)}
.method-option.active{border-color:var(--accent);background:var(--accent-bg)}
.method-option input{margin-top:2px;accent-color:var(--accent)}
.method-title{font-size:13px;font-weight:500;color:var(--text)}
.method-desc{font-size:11px;color:var(--text2);margin-top:1px}

/* email log */
.log-list{border:1px solid var(--border);border-radius:8px;overflow:hidden}
.log-entry{
  display:flex;align-items:flex-start;gap:10px;
  padding:9px 12px;font-size:12px;
  border-bottom:1px solid var(--border);
  color:var(--text2);
}
.log-entry:last-child{border-bottom:none}
.log-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px}
.log-dot.ok{background:var(--green)}
.log-dot.err{background:var(--red)}
.log-dot.mailto{background:var(--accent)}
.log-info{flex:1}
.log-info strong{color:var(--text);font-weight:500}
.log-time{color:var(--text3);font-size:11px;white-space:nowrap}

/* sync section */
.sync-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}

/* ═══ MODAL ═══ */
.modal-bg{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.35);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;
  z-index:999;animation:fadeIn .2s ease;
}
.modal{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:24px 26px;
  width:min(540px,94vw);max-height:90vh;overflow-y:auto;
  box-shadow:var(--shadow-lg);animation:modalIn .22s ease;
}
.modal-wide{width:min(640px,94vw)}
.modal h3{font-size:17px;font-weight:600;color:var(--text);margin-bottom:18px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:13px}
.form-row.single{grid-template-columns:1fr}
.form-row.triple{grid-template-columns:1fr 1fr 1fr}
.form-field{display:flex;flex-direction:column;gap:4px}
.form-field label{font-size:12px;font-weight:600;color:var(--text2)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.m-btn{
  font-size:13px;font-weight:500;padding:8px 16px;
  border-radius:8px;border:1px solid var(--border2);
  background:var(--surface);color:var(--text2);cursor:pointer;
  transition:all var(--t);
}
.m-btn:hover{background:var(--surface2);color:var(--text)}
.m-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.m-btn.primary:hover{opacity:.88}
.m-btn.danger{background:var(--red);color:#fff;border-color:var(--red)}
.m-btn.danger:hover{opacity:.88}

/* causale live */
#causale-live{margin-bottom:12px}

/* email modal */
.email-tab-row{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:14px}
.email-tab{
  padding:7px 14px;font-size:13px;border:none;
  background:none;cursor:pointer;color:var(--text2);
  border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:all var(--t);font-family:var(--ff);
}
.email-tab:hover{color:var(--text)}
.email-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.email-preview-box{
  border:1px solid var(--border);border-radius:8px;overflow:hidden;
}
.email-preview-header{
  padding:10px 14px;background:var(--surface2);
  font-size:12px;color:var(--text2);line-height:1.7;
  border-bottom:1px solid var(--border);
}
.email-preview-body{
  padding:14px;font-size:13px;color:var(--text);line-height:1.7;
}
.email-edit-field{margin-bottom:11px}
.email-edit-field label{font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:4px}
.email-edit-field input,.email-edit-field textarea{
  width:100%;font-size:13px;border-radius:8px;
  border:1px solid var(--border2);padding:8px 11px;
  background:var(--surface);color:var(--text);
  font-family:var(--ff);transition:border-color var(--t),box-shadow var(--t);
}
.email-edit-field input:focus,.email-edit-field textarea:focus{
  outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(42,91,215,.12);
}
.email-edit-field textarea{resize:vertical;min-height:160px;line-height:1.6}

/* notification center */
.notif-center{
  position:absolute;top:calc(100% + 8px);right:0;
  width:320px;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);z-index:200;
  animation:modalIn .2s ease;overflow:hidden;
}
.notif-header{
  padding:12px 14px;border-bottom:1px solid var(--border);
  font-size:13px;font-weight:600;color:var(--text);
  display:flex;justify-content:space-between;align-items:center;
}
.notif-item{
  padding:10px 14px;border-bottom:1px solid var(--border);
  transition:background var(--t);cursor:pointer;
}
.notif-item:last-child{border-bottom:none}
.notif-item:hover{background:var(--surface2)}
.notif-item-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:1px}
.notif-item-sub{font-size:12px;color:var(--text2)}
.notif-item .badge{margin-left:8px;vertical-align:middle}
.notif-empty{padding:20px;text-align:center;font-size:13px;color:var(--text3)}

/* export dropdown */
.export-dd{position:relative}
.export-menu{
  position:absolute;top:calc(100% + 6px);right:0;
  min-width:190px;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius);
  box-shadow:var(--shadow-md);z-index:100;overflow:hidden;
  animation:modalIn .15s ease;
}
.export-menu button{
  display:flex;align-items:center;gap:10px;
  width:100%;padding:9px 14px;font-size:13px;
  border:none;background:none;color:var(--text);
  cursor:pointer;font-family:var(--ff);text-align:left;
  transition:background var(--t);
}
.export-menu button:hover{background:var(--surface2)}
.export-menu button svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.75;flex-shrink:0}
.export-menu hr{border:none;border-top:1px solid var(--border);margin:2px 0}

/* quick renew panel */
.quick-renew-panel{
  background:var(--green-bg);border:1px solid var(--green-border);
  border-radius:8px;padding:12px 14px;margin:0 16px 12px;
  display:flex;align-items:center;gap:12px;
  animation:slideDown .2s ease;
}
.qrp-info{flex:1;font-size:13px;color:var(--green)}
.qrp-info strong{font-weight:600}
.qrp-actions{display:flex;gap:6px}
.qrp-btn{
  font-size:12px;font-weight:500;padding:5px 12px;
  border-radius:7px;border:1px solid var(--green-border);
  background:var(--surface);color:var(--green);cursor:pointer;
  transition:all var(--t);
}
.qrp-btn:hover{background:var(--green-bg)}
.qrp-btn.confirm{background:var(--green);color:#fff;border-color:var(--green)}
.qrp-btn.confirm:hover{opacity:.88}

/* login */
.login-screen{
  min-height:100vh;display:flex;align-items:center;
  justify-content:center;background:var(--bg);padding:20px;
}
.login-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);
  padding:36px 32px;max-width:390px;width:100%;
}
.login-logo{
  display:flex;align-items:center;gap:10px;margin-bottom:20px;
}
.login-logo .logo-mark{width:36px;height:36px;border-radius:10px}
.login-logo-text{font-size:16px;font-weight:600;color:var(--text)}
.login-subtitle{font-size:13px;color:var(--text2);margin-bottom:22px}
.login-err{
  background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);
  font-size:12px;font-weight:500;padding:8px 11px;border-radius:7px;
  margin-bottom:13px;display:none;
}
.login-toggle-link{margin-top:14px;text-align:center;font-size:13px;color:var(--text3)}
.login-toggle-link a{color:var(--accent);cursor:pointer;font-weight:500;text-decoration:none}
.login-toggle-link a:hover{text-decoration:underline}
.pw-wrap{position:relative}
.pw-wrap input{width:100%;padding-right:38px}
.pw-eye{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;
}
.pw-eye:hover{color:var(--text2)}
.pw-eye svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;display:block}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .5s linear infinite;vertical-align:middle;margin-right:5px}

/* ═══ TOAST ═══ */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--text);color:var(--surface);
  padding:9px 18px;border-radius:8px;font-size:13px;font-weight:500;
  z-index:2000;box-shadow:var(--shadow-lg);pointer-events:none;
  animation:toastIn .25s ease, toastOut .3s ease 2s forwards;
}

/* ═══ EMPTY STATE ═══ */
.empty-state{
  text-align:center;padding:3rem 1rem;
  color:var(--text3);font-size:14px;
}
.empty-state svg{margin-bottom:12px;opacity:.4;display:block;margin-left:auto;margin-right:auto}

/* ═══ SCROLLBAR ═══ */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* ═══ ANIMATIONS ═══ */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(6px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ═══ MOBILE ═══ */
@media(max-width:900px){
  .metrics-grid{grid-template-columns:1fr 1fr}
  .card-fields{grid-template-columns:repeat(3,1fr)}
  .sync-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:640px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:60;transform:translateX(-100%)}
  .sidebar.mobile-open{transform:translateX(0)}
  .page-content{padding:16px}
  .metrics-grid{grid-template-columns:1fr 1fr;gap:8px}
  .card-fields{grid-template-columns:1fr 1fr}
  .form-row{grid-template-columns:1fr}
  .settings-row{grid-template-columns:1fr}
  .settings-row.triple{grid-template-columns:1fr}
  .sync-grid{grid-template-columns:1fr}
}
@media print{
  .sidebar,.topbar,.card-actions{display:none!important}
  .contract-card{break-inside:avoid;box-shadow:none}
  .modal-bg{display:none!important}
}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
</style>
</head>

      </button>
      <button class="nav-item" id="nav-calendar" onclick="setPage('calendar')">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>

      </button>
      <button class="nav-item" id="nav-settings" onclick="setPage('settings')">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        <span>Impostazioni</span>
      </button>
      <span class="sidebar-section-label" style="margin-top:8px">Aziende</span>
    </div>
    <div class="sidebar-companies" id="sidebar-companies"></div>
    <div class="sidebar-footer">
      <button class="toggle-sidebar-btn" onclick="toggleSidebar()" id="sidebar-toggle-btn">
        <svg viewBox="0 0 24 24" id="sidebar-toggle-icon"><path d="M15 18l-6-6 6-6"/></svg>
        <span id="sidebar-toggle-label">Comprimi</span>
      </button>
    </div>
  </nav>

  <div class="main-area">
    <header class="topbar">
      <button class="icon-btn" onclick="toggleMobileSidebar()" id="mobile-menu-btn" style="display:none">
        <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div class="topbar-search" id="topbar-search-wrap">
        <span class="si"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
        <input type="text" placeholder="Cerca contratti…" id="search-input" oninput="onSearch(this.value)">
      </div>
      <div class="topbar-actions">
        <div class="export-dd" id="export-dd">
          <button class="tb-btn" onclick="toggleExportMenu(event)">
            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Esporta
          </button>
          <div class="export-menu" id="export-menu" style="display:none">
            <button onclick="exportExcel();closeExportMenu()">
              <svg viewBox="0 0 24 24" stroke="#2d8a4e"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
              Excel (.xlsx)

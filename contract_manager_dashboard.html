  /* ── Settings panel renderer ── */
  function renderSettingsPanel() {
    const s = emailSettings;
    const autoEnabled = s.autoSend.enabled;
    const allDays = [60, 30, 15, 7, 3, 1];
    const activeDays = s.autoSend.daysBeforeExpiry || [];

    const ejsConfigured = isEmailJSConfigured();
    let statusHtml = '';
    if (s.sendMethod === 'emailjs') {
      statusHtml = ejsConfigured
        ? `<span class="settings-status ok">${icons.check} EmailJS configurato</span>`
        : `<span class="settings-status warn">EmailJS non configurato</span>`;
    } else {
      statusHtml = `<span class="settings-status off">Modalità mailto: (client email)</span>`;
    }

    let logHtml = '';
    if (emailLog.length > 0) {
      logHtml = `<div class="email-log">`;
      emailLog.slice(0, 15).forEach(l => {
        const dotClass = l.status === 'success' ? (l.method === 'mailto' ? 'mailto' : 'success') : 'error';
        const time = new Date(l.date).toLocaleString('it-IT', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
        logHtml += `<div class="email-log-entry">
          <span class="log-status-dot ${dotClass}"></span>
          <div class="log-info"><strong>${esc(l.contractName)}</strong> → ${esc(l.recipients)}<br><span style="font-size:11px;color:var(--color-text-tertiary)">${esc(l.detail)}</span></div>
          <span class="log-time">${time}</span>
        </div>`;
      });
      logHtml += `</div>`;
    }

    return `<div style="margin-bottom:1.5rem">
      <div class="settings-section">
        <h4>${icons.mail} Metodo di invio email</h4>
        ${statusHtml}
        <div style="margin-top:12px">
          <label class="send-method-label"><input type="radio" name="sendMethod" value="mailto" ${s.sendMethod==='mailto'?'checked':''} onchange="setSendMethod('mailto')"> <strong>Mailto</strong> — apre il client email (Outlook, Gmail, Apple Mail…)</label>
          <label class="send-method-label"><input type="radio" name="sendMethod" value="emailjs" ${s.sendMethod==='emailjs'?'checked':''} onchange="setSendMethod('emailjs')"> <strong>EmailJS</strong> — invio diretto automatico (gratis, 200 email/mese)</label>
        </div>
        ${s.sendMethod === 'emailjs' ? `
        <div class="settings-row triple" style="margin-top:12px">
          <div class="settings-field">
            <label for="ejs-service">Service ID</label>
            <input id="ejs-service" type="text" value="${escAttr(s.emailjs.serviceId)}" placeholder="service_xxxxxxx" onchange="saveEJSField('serviceId', this.value)">
          </div>
          <div class="settings-field">
            <label for="ejs-template">Template ID</label>
            <input id="ejs-template" type="text" value="${escAttr(s.emailjs.templateId)}" placeholder="template_xxxxxxx" onchange="saveEJSField('templateId', this.value)">
          </div>
          <div class="settings-field">
            <label for="ejs-key">Public Key</label>
            <input id="ejs-key" type="text" value="${escAttr(s.emailjs.publicKey)}" placeholder="xxxxxxxxxxxx" onchange="saveEJSField('publicKey', this.value)">
          </div>
        </div>
        <div class="settings-hint" style="margin-top:4px">
          Registrati gratis su <strong>emailjs.com</strong> → crea un servizio email (Gmail, Outlook…) → crea un template con variabili: <code>{{to_email}}</code>, <code>{{subject}}</code>, <code>{{message}}</code>, <code>{{contract_name}}</code>
        </div>
        <div style="margin-top:10px">
          <button class="btn-sm" onclick="testEmailJS()">Testa connessione</button>
        </div>
        ` : ''}
      </div>

      <div class="settings-section">
        <h4>${icons.alertTriangle} Invio automatico</h4>
        <div class="toggle-row">
          <label class="toggle-switch">
            <input type="checkbox" ${autoEnabled?'checked':''} onchange="toggleAutoSend(this.checked)">
            <span class="toggle-slider"></span>
          </label>
          <span class="toggle-label">Attiva invio automatico notifiche scadenza</span>
        </div>
        ${autoEnabled ? `
        <div style="margin-bottom:14px">
          <label style="font-size:12px;color:var(--color-text-secondary);font-weight:600;display:block;margin-bottom:6px">Invia notifica quando mancano (giorni):</label>
          <div class="auto-send-chips">
            ${allDays.map(d => `<button class="auto-chip${activeDays.includes(d) ? ' active' : ''}" onclick="toggleAutoDay(${d})">${d} gg</button>`).join('')}
          </div>
        </div>
        <div class="settings-row">
          <div class="settings-field">
            <label for="check-interval">Controlla ogni (minuti)</label>
            <input id="check-interval" type="number" min="5" max="1440" value="${s.autoSend.checkIntervalMinutes||60}" onchange="saveCheckInterval(parseInt(this.value))">
            <div class="settings-hint">Intervallo di verifica scadenze (min 5 min, max 24h). Funziona solo con la pagina aperta.</div>
          </div>
          <div class="settings-field">
            <label>Stato</label>
            <span class="settings-status ok" style="margin-top:8px">${icons.check} Attivo — prossimo controllo tra ${s.autoSend.checkIntervalMinutes||60} min</span>
          </div>
        </div>
        <div class="settings-hint">Le email automatiche vengono inviate max 1 volta al giorno per soglia/contratto. Ogni invio è registrato nel log sotto.</div>
        <div style="margin-top:10px"><button class="btn-sm" onclick="forceAutoCheck()">Esegui controllo adesso</button></div>
        ` : '<div class="settings-hint">Quando attivato, il sistema invierà automaticamente email di notifica ai giorni selezionati prima della scadenza di ogni contratto.</div>'}
      </div>

      <div class="settings-section">
        <h4>Log invii email</h4>
        ${emailLog.length === 0 ? '<div style="font-size:13px;color:var(--color-text-tertiary);padding:8px 0">Nessun invio registrato.</div>' : logHtml}
        ${emailLog.length > 0 ? '<div style="margin-top:10px"><button class="btn-sm" onclick="clearEmailLog()">Cancella log</button></div>' : ''}
      </div>

      <div class="settings-section">
        <h4>${icons.cloud} Sincronizzazione Cloud (Firebase)</h4>
        <div id="sync-status-indicator">
          ${!syncConfig.enabled
            ? '<span class="settings-status off">Sincronizzazione disattivata</span>'
            : syncState.connected
              ? '<span class="settings-status ok">' + icons.check + ' Connesso' + (syncState.lastSync ? ' — ultimo sync: ' + new Date(syncState.lastSync).toLocaleTimeString('it-IT') : '') + '</span>'
              : '<span class="settings-status warn">Connessione in corso…</span>'
          }
        </div>
        <div class="toggle-row" style="margin-top:12px">
          <label class="toggle-switch">
            <input type="checkbox" ${syncConfig.enabled?'checked':''} onchange="toggleCloudSync(this.checked)">
            <span class="toggle-slider"></span>
          </label>
          <span class="toggle-label">Attiva sincronizzazione cloud tra dispositivi</span>
        </div>
        <div class="settings-row triple" style="margin-top:8px">
          <div class="settings-field">
            <label for="sync-apikey">API Key</label>
            <input id="sync-apikey" type="text" value="${escAttr(syncConfig.apiKey)}" placeholder="AIzaSy..." onchange="saveSyncField('apiKey', this.value)">
          </div>
          <div class="settings-field">
            <label for="sync-dburl">Database URL</label>
            <input id="sync-dburl" type="text" value="${escAttr(syncConfig.databaseURL)}" placeholder="https://progetto.firebaseio.com" onchange="saveSyncField('databaseURL', this.value)">
          </div>
          <div class="settings-field">
            <label for="sync-room">Nome stanza</label>
            <input id="sync-room" type="text" value="${escAttr(syncConfig.roomName)}" placeholder="la-mia-azienda" onchange="saveSyncField('roomName', this.value)">
          </div>
        </div>
        <div class="settings-hint">Crea un progetto gratuito su <strong>console.firebase.google.com</strong> → Realtime Database → copia API Key e Database URL. Tutti i dispositivi con la stessa stanza vedranno gli stessi dati.</div>
        <div class="settings-hint" style="margin-top:4px">Regole database consigliate: <code>{"rules": {".read": true, ".write": true}}</code> (oppure configura autenticazione per maggiore sicurezza).</div>
        <div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn-sm" onclick="applySyncConfig()">Applica configurazione</button>
          <button class="btn-sm" id="btn-sync-pull" onclick="pullFromCloud()" ${!syncState.connected?'disabled':''}>Scarica dati dal cloud</button>
          <button class="btn-sm" id="btn-sync-push" onclick="forcePushToCloud()" ${!syncState.connected?'disabled':''}>Carica dati sul cloud</button>
        </div>
      </div>`;
    }

    /* ── Event handlers ── */
    window.setTab = (i) => { state.activeTab = i; state.searchQuery = ''; render(); };
    window.setSortBy = (v) => { state.sortBy = v; render(); };
    window.setSearch = (v) => { state.searchQuery = v; render(); };
    window.setFilterMonth = (v) => { state.filterMonth = v; render(); };
    window.openModal = (mode) => {
      if (mode === 'add') {
        state.modal = 'add-company';
        state.editingCompany = { name: '', adminEmail: '', companyEmail: '' };
        state.editingContract = null;
      } else {
        state.modal = mode;
        state.editingContract = null;
      }
      render();
    };
    window.closeModal = () => { state.modal = null; state.editingContract = null; state.editingCompany = null; render(); };
    window.closeEmailModal = () => { state.emailModal = null; state.emailDraft = null; state.emailEditMode = 'preview'; render(); };
    window.cancelDelete = () => { state.confirmDelete = null; render(); };
    window.exportCSV = exportCSV;
    window.exportExcel = exportExcel;
    window.exportPDF = exportPDF;
    window.toggleExportMenu = (e) => { e.stopPropagation(); state.showExportMenu = !state.showExportMenu; render(); };
    window.closeExportMenu = () => { state.showExportMenu = false; render(); };
    document.addEventListener('click', () => { if (state.showExportMenu) { state.showExportMenu = false; render(); } });

    window.toggleTheme = () => {
      state.theme = state.theme === 'dark' ? 'light' : 'dark';
      applyTheme(state.theme);
      render();
    };

    /* ── Sync event handlers ── */
    window.toggleCloudSync = (enabled) => {
      syncConfig.enabled = enabled;
      saveSyncConfig();
      if (enabled) { initFirebaseSync(); } else { disconnectSync(); }
      render();
    };
    window.saveSyncField = (field, value) => {
      syncConfig[field] = value;
      saveSyncConfig();
    };
    window.applySyncConfig = () => {
      saveSyncConfig();
      initFirebaseSync();
      render();
    };
    window.forcePushToCloud = () => {
      if (!syncState.connected || !syncState.db) return;
      syncState.skipNext = true;
      const roomRef = syncState.db.ref('rooms/' + encodeRoomName(syncConfig.roomName) + '/data');
      roomRef.set(JSON.parse(JSON.stringify(state.companies))).then(() => {
        syncState.lastSync = new Date().toISOString();
        updateSyncStatusUI();
      }).catch(err => { console.error('Push error:', err); syncState.skipNext = false; });
    };
    window.pullFromCloud = pullFromCloud;

    window.editContract = (id) => {
      state.editingContract = state.companies.find(c => c.id === id);
      if (state.editingContract) { state.modal = 'edit'; render(); }
    };

    window.addContractToCompany = () => {
      const uniqueNames = [...new Set(state.companies.map(c => c.name))];
      const companyName = uniqueNames[state.activeTab - 1];
      if (!companyName) return;
      const existing = state.companies.find(c => c.name === companyName);
      state.modal = 'add-contract';
      state.editingContract = {
        name: companyName,
        adminEmail: existing ? existing.adminEmail : '',
        companyEmail: existing ? existing.companyEmail : '',
        employeeName: '', contractType: '', startDate: '', endDate: '',
        renewable: true, renewMonths: 0, renewType: 'Senza causale',
        renewNotice: 30, renewCount: 0, notes: ''
      };
      render();
    };

    window.confirmDeleteContract = (id) => {
      state.confirmDelete = state.companies.find(c => c.id === id) || null;
      render();
    };

    window.doDelete = (id) => {
      const contract = state.confirmDelete;
      const label = contract ? (contract.employeeName ? `${contract.employeeName} (${contract.name})` : contract.name) : '';
      state.companies = state.companies.filter(c => c.id !== id);
      state.confirmDelete = null;
      const uniqueNames = [...new Set(state.companies.map(c => c.name))];
      if (state.activeTab > uniqueNames.length) state.activeTab = 0;
      saveData();
      render();
      showToast(`Contratto "${label}" eliminato`);
    };

    window.toggleSettings = () => { state.showSettings = !state.showSettings; render(); };

    window.setSendMethod = (m) => { emailSettings.sendMethod = m; saveSettings(); render(); };

    window.saveEJSField = (field, value) => {
      emailSettings.emailjs[field] = value.trim();
      saveSettings();
    };

    window.toggleAutoSend = (checked) => {
      emailSettings.autoSend.enabled = checked;
      saveSettings();
      if (checked) startAutoSend(); else stopAutoSend();
      render();
    };

    window.toggleAutoDay = (day) => {
      const arr = emailSettings.autoSend.daysBeforeExpiry;
      const idx = arr.indexOf(day);
      if (idx >= 0) arr.splice(idx, 1); else arr.push(day);
      arr.sort((a, b) => b - a);
      saveSettings();
      render();
    };

    window.saveCheckInterval = (val) => {
      emailSettings.autoSend.checkIntervalMinutes = Math.max(5, Math.min(1440, val || 60));
      saveSettings();
      if (emailSettings.autoSend.enabled) startAutoSend();
    };

    window.forceAutoCheck = async () => {
      showToast('Esecuzione controllo scadenze…');
      await runAutoSendCheck();
      render();
      showToast('Controllo completato — vedi log per dettagli');
    };

    window.testEmailJS = async () => {
      if (!isEmailJSConfigured()) { showToast('Compila tutti i campi EmailJS prima di testare.'); return; }
      try {
        emailjs.init(emailSettings.emailjs.publicKey);
        await emailjs.send(emailSettings.emailjs.serviceId, emailSettings.emailjs.templateId, {
          to_email: 'test@test.com',
          subject: 'Test connessione',
          message: 'Se ricevi questo messaggio, EmailJS è configurato correttamente.',
          contract_name: 'Test'
        });
        showToast('Connessione EmailJS riuscita — email di test inviata!');
        addLogEntry('Test', 'test@test.com', 'success', 'emailjs', 'Test connessione riuscito');
        render();
      } catch (err) {
        const errMsg = (err && err.text) || String(err);
        showToast('Errore EmailJS: ' + errMsg);
        addLogEntry('Test', 'test@test.com', 'error', 'emailjs', errMsg);
        render();
      }
    };

    window.clearEmailLog = () => {
      emailLog = [];
      saveEmailLog();
      render();
      showToast('Log email cancellato');
    };

    window.sendTestEmail = (id) => {
      state.emailModal = state.companies.find(c => c.id === id);
      state.emailEditMode = 'preview';
      state.emailDraft = null;
      render();
    };

    window.setEmailTab = (tab) => { state.emailEditMode = tab; render(); };

    window.updateEmailDraft = (field, value) => {
      if (state.emailDraft) state.emailDraft[field] = value;
    };

    window.resetEmailDraft = (id) => {
      state.emailDraft = null;
      render();
      showToast('Testo email ripristinato');
    };

    window.realSend = async (id) => {
      const c = state.companies.find(x => x.id === id);
      if (!c) return;
      const d = state.emailDraft;
      const to = d ? d.to : `${c.adminEmail}; ${c.companyEmail}`;
      const subject = d ? d.subject : `[ALERT] Contratto in scadenza — ${c.name}`;
      const body = d ? d.body : generateEmailBody(c, daysLeft(c.endDate));

      const result = await sendEmailReal(to, subject, body, c.name);

      state.emailModal = null;
      state.emailDraft = null;
      state.emailEditMode = 'preview';
      render();

      if (result.ok) {
        if (result.method === 'mailto') {
          showToast(`Email aperta nel client email per ${c.name}`);
        } else {
          showToast(`Email inviata con successo a: ${to}`);
        }
      } else {
        showToast(`Errore invio: ${result.error}`);
      }
    };

    window.saveCompany = () => {
      const name = document.getElementById('fc-name').value.trim();
      const adminEmail = document.getElementById('fc-admin').value.trim();
      const companyEmail = document.getElementById('fc-company').value.trim();

      if (!name) { showToast('Inserire il nome dell\'azienda.'); return; }

      /* Verifica duplicati */
      const uniqueNames = [...new Set(state.companies.map(c => c.name))];
      if (uniqueNames.some(n => n.toLowerCase() === name.toLowerCase())) {
        showToast('Azienda "' + name + '" già esistente. Usa il tab dell\'azienda per aggiungere dipendenti.');
        return;
      }

      /* Apri direttamente il form dipendente/contratto con dati azienda pre-compilati */
      state.modal = 'add-contract';
      state.editingCompany = null;
      state.editingContract = {
        name: name,
        adminEmail: adminEmail,
        companyEmail: companyEmail,
        employeeName: '', contractType: '', startDate: '', endDate: '',
        renewable: true, renewMonths: 0, renewType: 'Senza causale',
        renewNotice: 30, renewCount: 0, notes: ''
      };
      render();
      showToast('Azienda "' + name + '" pronta — inserisci il primo dipendente');
    };

    window.saveContract = () => {
      const name = document.getElementById('f-name').value.trim();
      const employeeName = document.getElementById('f-employee').value.trim();
      const contractType = document.getElementById('f-type').value.trim();
      const startDate = document.getElementById('f-start').value;
      const endDate = document.getElementById('f-end').value;
      const adminEmail = document.getElementById('f-admin').value.trim();
      const companyEmail = document.getElementById('f-company').value.trim();
      const renewable = document.getElementById('f-renew').value === 'yes';
      const renewMonths = parseInt(document.getElementById('f-months').value) || calcolaDurataMesi(startDate, endDate) || 12;
      const renewType = document.getElementById('f-rtype').value;
      const renewNotice = parseInt(document.getElementById('f-notice').value) || 30;
      const renewCount = parseInt(document.getElementById('f-renewcount').value) || 0;
      const notes = document.getElementById('f-notes').value.trim();

      if (!name || !endDate) { showToast('Inserire nome azienda e data scadenza.'); return; }

      /* Verifica causale prima del salvataggio */
      if (startDate && endDate) {
        const durataMesi = calcolaDurataMesi(startDate, endDate);
        const presenzaCausale = renewType === 'Con causale';
        const risultato = verificaCausale(durataMesi, renewCount, presenzaCausale);
        if (risultato.stato === 'ERRORE') {
          showToast('\u26A0 ' + risultato.motivazione);
          return;
        }
        if (risultato.stato === 'ATTENZIONE') {
          showToast('\u26A0 Attenzione: ' + risultato.motivazione);
        }
      }

      if (state.modal === 'edit' && state.editingContract) {
        const idx = state.companies.findIndex(c => c.id === state.editingContract.id);
        if (idx >= 0) {
          state.companies[idx] = { ...state.editingContract, name, employeeName, contractType, startDate, endDate, adminEmail, companyEmail, renewable, renewMonths, renewType, renewNotice, renewCount, notes };
          if (!Array.isArray(state.companies[idx].cantieri)) state.companies[idx].cantieri = [];
        }
        showToast('Contratto aggiornato');
      } else {
        const newId = Math.max(0, ...state.companies.map(c => c.id)) + 1;
        state.companies.push({ id: newId, name, employeeName, contractType, startDate, endDate, adminEmail, companyEmail, renewable, renewMonths, renewType, renewNotice, renewCount, notes, cantieri: [] });
        const uniqueNames = [...new Set(state.companies.map(c => c.name))];
        state.activeTab = uniqueNames.indexOf(name) + 1;
        showToast(state.modal === 'add-contract' ? 'Dipendente aggiunto' : 'Nuovo contratto aggiunto');
      }

      state.modal = null;
      state.editingContract = null;
      saveData();
      render();
    };

    /* ── Keyboard shortcuts ── */
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (state.confirmDelete) { state.confirmDelete = null; render(); }
        else if (state.emailModal) { state.emailModal = null; render(); }
        else if (state.modal) { state.modal = null; state.editingContract = null; state.editingCompany = null; render(); }
      }
    });

    /* ── Init ── */
    function checkAlerts() {
      state.companies.forEach(c => {
        const days = daysLeft(c.endDate);
        if (days >= 0 && days <= ALERT_DAYS) {
          console.log(`[ALERT] ${c.name}: scadenza tra ${days} giorni — email a ${c.adminEmail} e ${c.companyEmail}`);
        }
      });
    }

    /* ── Boot: check auth state ── */
    (function boot() {
      const cfg = loadAuthConfig();
      if (cfg.apiKey) {
        const app = getAuthApp();
        if (app) {
          app.auth().onAuthStateChanged(function(user) {
            if (user) {
              authUser = user;
              enterApp();
            } else {
              renderLoginScreen();
            }
          });
          return;
        }
      }
      renderLoginScreen();
    })();
    </script>
</body>
</html>
